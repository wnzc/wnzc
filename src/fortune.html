<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>星座运势</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f3e8ff 0%, #e8deff 50%, #f0e6ff 100%);
      color: #1a1a1a;
      overflow-x: hidden;
      position: relative;
    }

    /* 背景装饰 */
    .bg-decoration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
    }

    .bg-circle:nth-child(1) {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(139, 92, 246, 0.15));
      top: -100px;
      right: -50px;
    }

    .bg-circle:nth-child(2) {
      width: 250px;
      height: 250px;
      background: linear-gradient(135deg, rgba(196, 181, 253, 0.2), rgba(167, 139, 250, 0.12));
      bottom: 100px;
      left: -80px;
    }

    .bg-circle:nth-child(3) {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, rgba(233, 213, 255, 0.2), rgba(192, 132, 252, 0.12));
      top: 40%;
      right: -60px;
    }

    /* 浮动星星 */
    .floating-stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .floating-star {
      position: absolute;
      font-size: 14px;
      animation: starFloat 6s ease-in-out infinite;
      opacity: 0.4;
    }

    @keyframes starFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
      50% { transform: translateY(-20px) rotate(15deg); opacity: 0.7; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 50px;
    }

    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #d8b4fe;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.1);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 1);
      border-color: #a855f7;
      transform: translateX(-3px);
    }

    /* 标题区 */
    .header {
      text-align: center;
      padding: 50px 0 35px;
    }

    .header-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: inline-block;
      animation: iconFloat 3s ease-in-out infinite;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #1a1a1a;
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* 选择器 */
    .selector-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    }

    .selector-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #1a1a1a;
      margin-bottom: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .select-wrapper {
      position: relative;
    }

    .constellation-select {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      font-family: inherit;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      background: #ffffff;
      color: #1a1a1a;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: all 0.3s ease;
    }

    .constellation-select:hover {
      border-color: #667eea;
    }

    .constellation-select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    .constellation-select option {
      background: #ffffff;
      color: #1a1a1a;
      padding: 12px;
    }

    .select-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #667eea;
      pointer-events: none;
      font-size: 12px;
    }

    /* 加载状态 */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      gap: 20px;
    }

    .loading-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid #e2e8f0;
      border-top-color: #667eea;
      border-right-color: #764ba2;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      color: #1a1a1a;
      font-size: 14px;
    }

    /* 结果卡片 */
    .result-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 28px 24px;
      margin-bottom: 20px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
      animation: cardSlideUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes cardSlideUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 卡片头部 */
    .card-header {
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 24px;
    }

    .constellation-icon {
      font-size: 56px;
      margin-bottom: 12px;
      display: inline-block;
      animation: iconBounce 2s ease-in-out infinite;
    }

    @keyframes iconBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .constellation-name {
      font-size: 30px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .date-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f6ff;
      color: #667eea;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #e2e8f0;
    }

    /* 整体运势 */
    .overall-section {
      text-align: center;
      padding: 28px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 18px;
      margin-bottom: 22px;
    }

    .overall-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.9);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .overall-text {
      font-size: 15px;
      line-height: 1.9;
      color: #ffffff;
      margin-bottom: 16px;
    }

    .stars-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .star {
      font-size: 22px;
      transition: transform 0.3s ease;
    }

    .star.active {
      color: #ffd700;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
      animation: starPop 0.4s ease backwards;
    }

    .star.inactive {
      color: rgba(255, 255, 255, 0.4);
    }

    @keyframes starPop {
      0% { transform: scale(0) rotate(-180deg); }
      60% { transform: scale(1.3) rotate(10deg); }
      100% { transform: scale(1) rotate(0); }
    }

    /* 分类网格 */
    .section-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .section-item {
      background: #f8f9fa;
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .section-item:hover {
      background: #f0f4ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.1);
    }

    .section-icon {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .section-label {
      font-size: 11px;
      color: #667eea;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .section-value {
      font-size: 13px;
      color: #1a1a1a;
      font-weight: 500;
    }

    /* 幸运提示 */
    .luck-card {
      background: linear-gradient(135deg, #ff9f43, #feca57);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 22px;
    }

    .luck-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .luck-title {
      font-size: 15px;
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .luck-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .luck-item {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .luck-item:hover {
      transform: scale(1.05);
    }

    .luck-icon {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .luck-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 6px;
    }

    .luck-value {
      font-size: 14px;
      color: #ffffff;
      font-weight: 600;
    }

    /* 详情区 */
    .detail-section {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .detail-section:hover {
      background: #f0f4ff;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-icon {
      font-size: 24px;
    }

    .detail-title {
      font-size: 15px;
      color: #667eea;
      font-weight: 600;
    }

    .detail-text {
      font-size: 14px;
      line-height: 1.85;
      color: #1a1a1a;
      padding-left: 36px;
    }

    /* 关键词 */
    .keyword-card {
      background: linear-gradient(135deg, #00d9ff, #0099cc);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-top: 20px;
    }

    .keyword-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .keyword-text {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 3px;
    }

    /* 提示卡片 */
    .tip-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
    }

    .tip-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .tip-text {
      font-size: 16px;
      color: #1a1a1a;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .tip-hint {
      font-size: 13px;
      color: #1a1a1a;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 30px 0;
      color: #1a1a1a;
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* 错误 */
    .error-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-text {
      font-size: 15px;
      color: #1a1a1a;
    }

    /* 响应式 */
    @media (max-width: 420px) {
      .section-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .luck-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-decoration">
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
  </div>

  <!-- 浮动星星 -->
  <div class="floating-stars" id="floatingStars"></div>

  <a href="javascript:history.go(-1)" class="back-btn">
    <span>←</span>
    <span>返回</span>
  </a>

  <div class="container">
    <div class="header">
      <div class="header-icon">✨</div>
      <h1>星座运势</h1>
      <p>探索今日星象指引</p>
    </div>

    <div class="selector-card">
      <div class="selector-label">
        <span>✨</span>
        <span>选择星座</span>
      </div>
      <div class="select-wrapper">
        <select class="constellation-select" id="constellationSelect">
          <option value="">请选择星座</option>
          <option value="白羊座">♈ 白羊座 (3.21-4.19)</option>
          <option value="金牛座">♉ 金牛座 (4.20-5.20)</option>
          <option value="双子座">♊ 双子座 (5.21-6.21)</option>
          <option value="巨蟹座">♋ 巨蟹座 (6.22-7.22)</option>
          <option value="狮子座">♌ 狮子座 (7.23-8.22)</option>
          <option value="处女座">♍ 处女座 (8.23-9.22)</option>
          <option value="天秤座">♎ 天秤座 (9.23-10.23)</option>
          <option value="天蝎座">♏ 天蝎座 (10.24-11.22)</option>
          <option value="射手座">♐ 射手座 (11.23-12.21)</option>
          <option value="摩羯座">♑ 摩羯座 (12.22-1.19)</option>
          <option value="水瓶座">♒ 水瓶座 (1.20-2.18)</option>
          <option value="双鱼座">♓ 双鱼座 (2.19-3.20)</option>
        </select>
        <span class="select-arrow">▼</span>
      </div>
    </div>

    <div id="contentArea">
      <div class="tip-card">
        <div class="tip-icon">🌟</div>
        <div class="tip-text">请选择星座查看今日运势</div>
        <div class="tip-hint">选择后将自动保存</div>
      </div>
    </div>

    <div class="footer">
      ✨ 愿星辰指引你的每一天 ✨
    </div>
  </div>

  <script>
    // 星座图标映射
    const constellationIcons = {
      '白羊座': '♈', '金牛座': '♉', '双子座': '♊', '巨蟹座': '♋',
      '狮子座': '♌', '处女座': '♍', '天秤座': '♎', '天蝎座': '♏',
      '射手座': '♐', '摩羯座': '♑', '水瓶座': '♒', '双鱼座': '♓'
    };

    // 生成浮动星星
    function createFloatingStars() {
      const container = document.getElementById('floatingStars');
      const stars = ['⭐', '✨', '🌟', '💫'];
      for (let i = 0; i < 15; i++) {
        const star = document.createElement('div');
        star.className = 'floating-star';
        star.textContent = stars[Math.floor(Math.random() * stars.length)];
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = (Math.random() * 2 + 5) + 's';
        container.appendChild(star);
      }
    }
    createFloatingStars();

    const STORAGE_KEY = 'selected_constellation';
    const CACHE_KEY = 'fortune_cache';
    const API_KEY = 'ak_4e467bef570aafa08c488b57bd3c54946e25f2b0ff2064a1';
    const API_URL = 'https://v1.uuhb.cn/v1/fortune';

    const constellationSelect = document.getElementById('constellationSelect');
    const contentArea = document.getElementById('contentArea');

    function getTodayDateStr() {
      const now = new Date();
      return `${now.getMonth() + 1}月${now.getDate()}日`;
    }

    function getCachedFortune(constellation) {
      const cacheStr = localStorage.getItem(CACHE_KEY);
      if (!cacheStr) return null;
      try {
        const cache = JSON.parse(cacheStr);
        if (cache.constellation === constellation && cache.date === getTodayDateStr()) {
          return cache.data;
        }
      } catch (e) {}
      return null;
    }

    function saveFortuneCache(constellation, data) {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        constellation, date: getTodayDateStr(), data, updateTime: Date.now()
      }));
    }

    function loadSavedConstellation() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        constellationSelect.value = saved;
        fetchFortune(saved);
      }
    }

    async function fetchFortune(constellation, forceRefresh = false) {
      if (!constellation) return;

      if (!forceRefresh) {
        const cached = getCachedFortune(constellation);
        if (cached) {
          renderFortune(cached, true);
          fetchAndUpdateCache(constellation);
          return;
        }
      }

      contentArea.innerHTML = `
        <div class="loading">
          <div class="loading-ring"></div>
          <p>正在获取 ${constellation} 今日运势...</p>
        </div>
      `;

      try {
        const response = await fetch(`${API_URL}?apiKey=${API_KEY}&constellation=${encodeURIComponent(constellation)}`);
        const result = await response.json();

        if (result.success && result.data) {
          renderFortune(result.data);
          saveFortuneCache(constellation, result.data);
        } else {
          const cached = getCachedFortune(constellation);
          cached ? renderFortune(cached, true) : showError('获取运势失败');
        }
      } catch (error) {
        console.error(error);
        const cached = getCachedFortune(constellation);
        cached ? renderFortune(cached, true) : showError('网络请求失败');
      }
    }

    async function fetchAndUpdateCache(constellation) {
      try {
        const response = await fetch(`${API_URL}?apiKey=${API_KEY}&constellation=${encodeURIComponent(constellation)}`);
        const result = await response.json();
        if (result.success && result.data) {
          saveFortuneCache(constellation, result.data);
        }
      } catch (e) {}
    }

    function renderFortune(data, isCached = false) {
      const icon = constellationIcons[data.constellation] || '✨';
      const cacheTip = isCached ? '<span style="font-size:10px;margin-left:8px;color:#999;">(缓存)</span>' : '';

      let starsHtml = '';
      for (let i = 1; i <= 5; i++) {
        const isActive = i <= parseInt(data.overall_stars);
        starsHtml += `<span class="star ${isActive ? 'active' : 'inactive'}" style="animation-delay: ${(i-1) * 0.1}s">${isActive ? '★' : '☆'}</span>`;
      }

      contentArea.innerHTML = `
        <div class="result-card">
          <div class="card-header">
            <div class="constellation-icon">${icon}</div>
            <div class="constellation-name">${data.constellation}${cacheTip}</div>
            <div class="date-badge">
              <span>📅</span>
              <span>${data.date}</span>
            </div>
          </div>

          <div class="overall-section">
            <div class="overall-label">今日整体运势</div>
            <div class="overall-text">${data.overall_fortune}</div>
            <div class="stars-row">${starsHtml}</div>
          </div>

          <div class="section-grid">
            <div class="section-item">
              <div class="section-icon">💰</div>
              <div class="section-label">财富</div>
              <div class="section-value">${data.wealth_stars ? '★'.repeat(parseInt(data.wealth_stars)) + '☆'.repeat(5 - parseInt(data.wealth_stars)) : '—'}</div>
            </div>
            <div class="section-item">
              <div class="section-icon">💼</div>
              <div class="section-label">事业</div>
              <div class="section-value">${data.career_fortune ? '稳定' : '—'}</div>
            </div>
            <div class="section-item">
              <div class="section-icon">💝</div>
              <div class="section-label">健康</div>
              <div class="section-value">${data.health_index || '—'}</div>
            </div>
            <div class="section-item">
              <div class="section-icon">🤝</div>
              <div class="section-label">人缘</div>
              <div class="section-value">${data.negotiation_index || '—'}</div>
            </div>
          </div>

          <div class="luck-card">
            <div class="luck-header">
              <span>🍀</span>
              <span class="luck-title">今日幸运提示</span>
              <span>🍀</span>
            </div>
            <div class="luck-grid">
              <div class="luck-item">
                <div class="luck-icon">🎨</div>
                <div class="luck-label">幸运色</div>
                <div class="luck-value">${data.lucky_color || '—'}</div>
              </div>
              <div class="luck-item">
                <div class="luck-icon">🔢</div>
                <div class="luck-label">幸运数</div>
                <div class="luck-value">${data.lucky_number || '—'}</div>
              </div>
              <div class="luck-item">
                <div class="luck-icon">💕</div>
                <div class="luck-label">幸运星座</div>
                <div class="luck-value">${data.match_constellation || '—'}</div>
              </div>
            </div>
          </div>

          ${data.career_fortune ? `
          <div class="detail-section">
            <div class="detail-header">
              <span class="detail-icon">💼</span>
              <span class="detail-title">事业运势</span>
            </div>
            <div class="detail-text">${data.career_fortune}</div>
          </div>
          ` : ''}

          ${data.wealth_fortune ? `
          <div class="detail-section">
            <div class="detail-header">
              <span class="detail-icon">💰</span>
              <span class="detail-title">财富运势</span>
            </div>
            <div class="detail-text">${data.wealth_fortune}</div>
          </div>
          ` : ''}

          ${data.health_fortune ? `
          <div class="detail-section">
            <div class="detail-header">
              <span class="detail-icon">🏃</span>
              <span class="detail-title">健康提示</span>
            </div>
            <div class="detail-text">${data.health_fortune}</div>
          </div>
          ` : ''}

          ${data.short_comment ? `
          <div class="keyword-card">
            <div class="keyword-label">今日关键词</div>
            <div class="keyword-text">${data.short_comment}</div>
          </div>
          ` : ''}
        </div>
      `;
    }

    function showError(message) {
      contentArea.innerHTML = `
        <div class="error-card">
          <div class="error-icon">😔</div>
          <div class="error-text">${message}</div>
        </div>
      `;
    }

    constellationSelect.addEventListener('change', (e) => {
      const value = e.target.value;
      if (value) {
        localStorage.setItem(STORAGE_KEY, value);
        localStorage.removeItem(CACHE_KEY);
        fetchFortune(value, true);
      } else {
        contentArea.innerHTML = `
          <div class="tip-card">
            <div class="tip-icon">🌟</div>
            <div class="tip-text">请选择星座查看今日运势</div>
            <div class="tip-hint">选择后将自动保存</div>
          </div>
        `;
      }
    });

    loadSavedConstellation();
  </script>
</body>
</html>
