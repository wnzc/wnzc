<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>量子塔防</title>
<style>
  * { box-sizing: border-box; }
  html, body { 
    margin:0; 
    padding:0; 
    height: 100%;
    background:#0f172a; 
    color:white; 
    font-family:sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  #game-container {
    width: 100%;
    max-width: 450px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 56px); /* 减去 tower-panel 的高度 */
  }
  canvas { 
    display:block; 
    background:#1e293b; 
    flex: 1;
  }
  #info { 
    text-align:center; 
    padding:8px; 
    font-size:14px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 5px;
  }
  .energy { color:#fbbf24; }
  .wave { color:#38bdf8; }
  .lives { color:#f87171; }
  #tower-panel { 
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    display:flex; 
    justify-content:center; 
    gap:8px; 
    padding:8px 10px;
    background:#1e293b;
    border-top:1px solid #334155;
    flex-wrap: nowrap;
    overflow-x: auto;
    z-index: 100;
  }
  .tower-btn {
    flex: 0 0 auto;
    min-width: 70px;
    max-width: 80px;
    height: 40px;
    padding:6px 4px;
    border:2px solid #334155;
    border-radius:8px;
    background:#0f172a;
    color:white;
    cursor:pointer;
    font-size:11px;
    text-align: center;
    transition:0.2s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .tower-btn:active { transform: scale(0.95); }
  .tower-btn:hover { border-color:#38bdf8; }
  .tower-btn.selected { border-color:#22c55e; background:#1a3a2a; }
  .tower-btn .cost { color:#fbbf24; font-size:11px; }
  .tower-btn.slow { border-color:#38bdf8; }
  .tower-btn.burst { border-color:#f472b6; }
  .tower-btn.thunder { border-color:#a855f7; }
  .tower-btn.remove { border-color:#ef4444; }
  .tower-btn.remove.selected { border-color:#ef4444; background:#3a1a1a; }
  
  /* 游戏结束统计覆盖层 */
  #stats-overlay, #start-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .stats-panel {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 2px solid #38bdf8;
    border-radius: 16px;
    padding: 24px 32px;
    max-width: 360px;
    width: 90%;
    text-align: center;
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
  }
  .stats-title {
    font-size: 28px;
    font-weight: bold;
    color: #ef4444;
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #334155;
    font-size: 16px;
  }
  .stats-row:last-child {
    border-bottom: none;
  }
  .stats-label {
    color: #94a3b8;
  }
  .stats-value {
    color: #22c55e;
    font-weight: bold;
  }
  .stats-section-title {
    color: #38bdf8;
    font-size: 14px;
    margin-top: 16px;
    margin-bottom: 8px;
    text-align: left;
  }
  .monster-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }
  .monster-stat {
    background: #0f172a;
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
  }
  .monster-stat-label {
    color: #94a3b8;
  }
  .monster-stat-value {
    color: #fbbf24;
    font-weight: bold;
    font-size: 16px;
  }
  .restart-btn {
    margin-top: 24px;
    padding: 14px 40px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
  }
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
  }
  .restart-btn:active {
    transform: translateY(0);
  }
  
  /* 开始界面 */
  .start-panel {
    text-align: center;
  }
  .game-title {
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(135deg, #38bdf8, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    text-shadow: none;
  }
  .game-subtitle {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 30px;
  }
  .tower-intro {
    text-align: left;
    margin: 20px 0;
    padding: 15px;
    background: #0f172a;
    border-radius: 10px;
  }
  .tower-intro h4 {
    color: #38bdf8;
    margin: 0 0 10px 0;
    font-size: 14px;
  }
  .tower-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 13px;
    color: #cbd5e1;
  }
  .tower-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: white;

  .tower-icon.slow { background: #38bdf8; }
  .tower-icon.burst { background: #f472b6; }
  .tower-icon.thunder { background: #a855f7; }
  .monster-intro {
    text-align: left;
    margin: 20px 0;
    padding: 15px;
    background: #0f172a;
    border-radius: 10px;
  }
  .monster-intro h4 {
    color: #ef4444;
    margin: 0 0 10px 0;
    font-size: 14px;
  }
  .monster-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
    font-size: 12px;
    color: #cbd5e1;
  }
  .monster-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: white;
  }
  .start-btn {
    margin-top: 20px;
    padding: 16px 60px;
    font-size: 20px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(56, 189, 248, 0.4);
  }
  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 25px rgba(56, 189, 248, 0.5);
  }
  .start-btn:active {
    transform: translateY(0);
  }
</style>
</head>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 响应式画布大小
function resizeCanvas() {
  const containerWidth = Math.min(window.innerWidth * 0.95, 450);
  const width = Math.floor(containerWidth);
  const height = Math.floor(width * 19 / 9);
  
  canvas.width = width;
  canvas.height = height;
  
  initGame();
}

// 检测是否竖屏模式（高度大于宽度）
function isPortraitMode() {
  return window.innerHeight > window.innerWidth;
}

// 动态网格配置
let GRID_SIZE, COLS, ROWS, PATH;

function initGame() {
  // 根据画布大小计算网格，确保格子为正方形
  const colsCount = 10;
  GRID_SIZE = Math.floor(canvas.width / colsCount);
  GRID_SIZE = Math.max(30, Math.min(50, GRID_SIZE));
  COLS = colsCount;
  ROWS = Math.floor(canvas.height / GRID_SIZE);
  
  // 动态生成路径
  generatePath();
  
  // 重新渲染
  render();
}

function generatePath() {
  PATH = [];
  
  // 竖屏S型路径：左右摆动，上下间隔有空间放炮台
  const midCol = Math.floor(COLS / 2);
  const leftCol = Math.floor(COLS * 0.25);
  const rightCol = Math.floor(COLS * 0.75);
  const pathRows = [1, 4, 7, 10]; // 路径行，间隔均匀
  
  // 从顶部中间开始
  PATH.push({col: midCol, row: 0});
  PATH.push({col: midCol, row: 1});
  
  // S型左弯
  for (let col = midCol; col >= leftCol; col--) {
    PATH.push({col, row: 2});
  }
  for (let row = 2; row <= pathRows[0]; row++) {
    PATH.push({col: leftCol, row});
  }
  
  // S型右弯
  for (let col = leftCol; col <= rightCol; col++) {
    PATH.push({col, row: pathRows[0]});
  }
  for (let row = pathRows[0]; row <= pathRows[1]; row++) {
    PATH.push({col: rightCol, row});
  }
  
  // S型左弯
  for (let col = rightCol; col >= leftCol; col--) {
    PATH.push({col, row: pathRows[1]});
  }
  for (let row = pathRows[1]; row <= pathRows[2]; row++) {
    PATH.push({col: leftCol, row});
  }
  
  // S型右弯
  for (let col = leftCol; col <= rightCol; col++) {
    PATH.push({col, row: pathRows[2]});
  }
  for (let row = pathRows[2]; row <= pathRows[3]; row++) {
    PATH.push({col: rightCol, row});
  }
  
  // 到底部中间出口
  for (let col = rightCol; col >= midCol; col--) {
    PATH.push({col, row: pathRows[3]});
  }
  for (let row = pathRows[3]; row < ROWS; row++) {
    PATH.push({col: midCol, row});
  }
  // 路径上的格子集合
  pathSet = new Set(PATH.map(p => `${p.col},${p.row}`));
  
  // 重新计算可放置格子
  placeableCells = getAdjacentToPath();
}

let pathSet;
let placeableCells;

// 游戏状态
let towers = [];
let enemies = [];
let bullets = [];
let energy = 100;
let lives = 10;
let wave = 1;
let waveTimer = 0;
let enemiesThisWave = 0;
let totalEnemiesThisWave = 5;
let selectedTower = 'slow';
let selectedCost = 20;
let gameInitialized = false;
let gameOver = false;
let gameStarted = false;
let countdownEndTime = 0; // 倒计时结束时间戳
let countdownActive = true; // 是否处于倒计时状态
const COUNTDOWN_SECONDS = 3; // 倒计时秒数

// 游戏统计数据
let stats = {
  kills: 0,
  normalKills: 0,
  fastKills: 0,
  toughKills: 0,
  ghostKills: 0,
  berserkerKills: 0,
  towersBuilt: 0,
  energyUsed: 0
};

// 获取路径边的格子
function getAdjacentToPath() {
  const adjacent = new Set();
  const dirs = [{col:1,row:0},{col:-1,row:0},{col:0,row:1},{col:0,row:-1}];
  
  PATH.forEach(p => {
    dirs.forEach(d => {
      const newCol = p.col + d.col;
      const newRow = p.row + d.row;
      const key = `${newCol},${newRow}`;
      if (newCol >= 0 && newCol < COLS && newRow >= 0 && newRow < ROWS && !pathSet.has(key)) {
        adjacent.add(key);
      }
    });
  });
  return adjacent;
}

// 获取格子中心坐标
function gridToCenter(col, row) {
  return {
    x: col * GRID_SIZE + GRID_SIZE / 2,
    y: row * GRID_SIZE + GRID_SIZE / 2
  };
}

// 获取格子坐标
function getGridPos(x, y) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    col: Math.floor((x - rect.left) * scaleX / GRID_SIZE),
    row: Math.floor((y - rect.top) * scaleY / GRID_SIZE)
  };
}

// 判断是否可以放炮台
function canPlaceTower(col, row) {
  return placeableCells && placeableCells.has(`${col},${row}`);
}

// 绘制网格
function drawGrid() {
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  
  for (let col = 0; col <= COLS; col++) {
    ctx.beginPath();
    ctx.moveTo(col * GRID_SIZE, 0);
    ctx.lineTo(col * GRID_SIZE, canvas.height);
    ctx.stroke();
  }
  
  for (let row = 0; row <= ROWS; row++) {
    ctx.beginPath();
    ctx.moveTo(0, row * GRID_SIZE);
    ctx.lineTo(canvas.width, row * GRID_SIZE);
    ctx.stroke();
  }
}

// 绘制路径
function drawPath() {
  ctx.fillStyle = '#4c1d95';
  PATH.forEach(p => {
    ctx.fillRect(p.col * GRID_SIZE, p.row * GRID_SIZE, GRID_SIZE, GRID_SIZE);
  });
  
  // 起点和终点
  const start = PATH[0];
  const end = PATH[PATH.length - 1];
  
  ctx.fillStyle = '#22c55e';
  ctx.font = `bold ${GRID_SIZE * 0.3}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('入', start.col * GRID_SIZE + GRID_SIZE / 2, start.row * GRID_SIZE + GRID_SIZE / 2);
  
  ctx.fillStyle = '#ef4444';
  ctx.fillText('出', end.col * GRID_SIZE + GRID_SIZE / 2, end.row * GRID_SIZE + GRID_SIZE / 2);
}

// 绘制可放置区域
function drawPlaceableCells() {
  if (!placeableCells) return;
  ctx.strokeStyle = 'rgba(34, 197, 94, 0.3)';
  ctx.lineWidth = 2;
  
  placeableCells.forEach(key => {
    const [col, row] = key.split(',').map(Number);
    ctx.strokeRect(col * GRID_SIZE + 2, row * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
  });
}

// 塔类
class Tower {
  constructor(col, row, mode) {
    this.col = col;
    this.row = row;
    const pos = gridToCenter(col, row);
    this.x = pos.x;
    this.y = pos.y;
    this.range = mode === 'slow' ? 100 : (mode === 'thunder' ? 90 : 80);
    this.cooldown = 0;
    this.mode = mode;
  }
  
  draw() {
    const size = GRID_SIZE * 0.4;
    const color = this.mode === 'slow' ? '#38bdf8' : (this.mode === 'thunder' ? '#a855f7' : '#f472b6');
    
    // 圆形背景
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fill();
    
    // 中心文字
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${GRID_SIZE * 0.3}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let text = this.mode === 'slow' ? '冰' : (this.mode === 'thunder' ? '雷' : '爆');
    ctx.fillText(text, this.x, this.y);
    
    // 显示范围
    if (this.showRange) {
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  
  update() {
    this.cooldown--;
    if (this.cooldown <= 0) {
      let target = null;
      let minDist = Infinity;
      
      // 雷电炮优先攻击未受损的敌人
      enemies.forEach(e => {
        const d = dist(this, e);
        if (d < this.range && d < minDist) {
          if (this.mode !== 'thunder' || e.hp >= e.maxHp * 0.5) {
            minDist = d;
            target = e;
          }
        }
      });
      
      if (target) {
        if (this.mode === 'thunder') {
          // 雷电炮攻击多个敌人
          const chainTargets = [target];
          let lastTarget = target;
          for (let i = 0; i < 3; i++) {
            let nextTarget = null;
            let nextDist = 70; // 连锁距离
            enemies.forEach(e => {
              if (!chainTargets.includes(e) && !e.dead) {
                const d = dist(lastTarget, e);
                if (d < nextDist) {
                  nextDist = d;
                  nextTarget = e;
                }
              }
            });
            if (nextTarget) {
              chainTargets.push(nextTarget);
              lastTarget = nextTarget;
            } else {
              break;
            }
          }
          chainTargets.forEach(t => {
            bullets.push(new Bullet(this, t, this.mode, chainTargets.indexOf(t) === 0 ? null : chainTargets[chainTargets.indexOf(t) - 1]));
          });
          this.cooldown = 40;
        } else {
          bullets.push(new Bullet(this, target, this.mode));
          this.cooldown = this.mode === 'slow' ? 100 : 50;
        }
      }
    }
  }
}

// 敌人类
class Enemy {
  constructor(forcedType = null) {
    this.pathIndex = 0;
    const start = PATH[0];
    const pos = gridToCenter(start.col, start.row);
    this.x = pos.x;
    this.y = pos.y;
    
    if (forcedType) {
      this.type = forcedType;
    } else {
      const types = ['normal', 'fast', 'tough', 'ghost', 'berserker'];
      const weights = [0.5, 0.2, 0.1, 0.1, 0.1];
      const rand = Math.random();
      let cumulative = 0;
      
      for (let i = 0; i < types.length; i++) {
        if (rand < cumulative + weights[i]) {
          this.type = types[i];
          break;
        }
        cumulative += weights[i];
      }
    }
    
    // 根据类型设置属性 (血量随波次指数增长)
    if (this.type === 'normal') {
      this.reward = 5;
      this.color = '#22c55e';
      this.speed = 0.8 + wave * 0.08;
      this.hp = Math.floor(30 * Math.pow(1.12, wave));
    } else if (this.type === 'fast') {
      this.reward = 3;
      this.color = '#facc15';
      this.speed = 1.5 + wave * 0.12;
      this.hp = Math.floor(20 * Math.pow(1.1, wave));
    } else if (this.type === 'tough') {
      this.reward = 10;
      this.color = '#ef4444';
      this.speed = 0.5 + wave * 0.05;
      this.hp = Math.floor(60 * Math.pow(1.15, wave));
    } else if (this.type === 'ghost') {
      this.reward = 8;
      this.color = '#a855f7';
      this.speed = 0.9 + wave * 0.06;
      this.hp = Math.floor(25 * Math.pow(1.11, wave));
      this.invisible = false;
      this.invisibleTimer = 0;
    } else if (this.type === 'berserker') {
      this.reward = 12;
      this.color = '#f97316';
      this.speed = 0.4 + wave * 0.03;
      this.hp = Math.floor(80 * Math.pow(1.13, wave));
    }
    this.maxHp = this.hp;
    this.slowed = false;
    this.slowTimer = 0;
  }
  
  draw() {
    const size = GRID_SIZE * 0.4;
    
    // 隐匿者隐身效果
    if (this.type === 'ghost' && this.invisible) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = this.color;
    } else {
      ctx.globalAlpha = 1;
      ctx.fillStyle = this.slowed ? '#60a5fa' : this.color;
    }
    
    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fill();
    
    // 狂暴者特殊效果
    if (this.type === 'berserker') {
      const ragePercent = 1 - this.hp / this.maxHp;
      ctx.strokeStyle = `rgba(249, 115, 22, ${ragePercent * 0.8})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(this.x, this.y, size + 5, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${GRID_SIZE * 0.25}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (this.type === 'fast') {
      ctx.fillText('速', this.x, this.y);
    } else if (this.type === 'tough') {
      ctx.fillText('坚', this.x, this.y);
    } else if (this.type === 'ghost') {
      ctx.fillText('隐', this.x, this.y);
    } else if (this.type === 'berserker') {
      ctx.fillText('狂', this.x, this.y);
    } else {
      ctx.fillText('小', this.x, this.y);
    }
    
    // 血条始终显示，添加圆角和边框
    const barWidth = GRID_SIZE * 0.8;
    const barHeight = GRID_SIZE * 0.15;
    const barX = this.x - barWidth / 2;
    const barY = this.y - size - barHeight - 2;
    const radius = 3;
    
    // 背景（满血时为深色）
    ctx.fillStyle = '#1e293b';
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barWidth, barHeight, radius);
    ctx.fill();
    ctx.stroke();
    
    const hpPercent = Math.max(0, this.hp / this.maxHp);
    if (hpPercent > 0) {
      ctx.fillStyle = hpPercent > 0.5 ? this.color : (hpPercent > 0.25 ? '#fbbf24' : '#ef4444');
      ctx.beginPath();
      ctx.roundRect(barX + 1, barY + 1, (barWidth - 2) * hpPercent, barHeight - 2, radius - 1);
      ctx.fill();
    }
  }
  
  update() {
    if (this.slowed) {
      this.slowTimer--;
      if (this.slowTimer <= 0) {
        this.slowed = false;
      }
    }
    
    // 隐匿者隐身逻辑
    if (this.type === 'ghost') {
      this.invisibleTimer++;
      if (this.invisibleTimer >= 60 && this.invisibleTimer < 120) {
        this.invisible = true;
      } else {
        this.invisible = false;
      }
    }
    
    let currentSpeed = this.speed;
    
    // 冰冻减速对隐匿者无效
    if (this.slowed && this.type !== 'ghost') {
      currentSpeed *= 0.4;
    }
    
    // 狂暴者：血量越低速度越快
    if (this.type === 'berserker') {
      const ragePercent = 1 - this.hp / this.maxHp;
      currentSpeed *= (1 + ragePercent * 1.5);
    }
    
    if (this.pathIndex < PATH.length - 1) {
      const target = PATH[this.pathIndex + 1];
      const targetPos = gridToCenter(target.col, target.row);
      const dx = targetPos.x - this.x;
      const dy = targetPos.y - this.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      
      if (d < currentSpeed) {
        this.pathIndex++;
      } else {
        this.x += (dx / d) * currentSpeed;
        this.y += (dy / d) * currentSpeed;
      }
    } else {
      this.dead = true;
      lives--;
      document.getElementById('lives').textContent = lives;
    }
  }
}

// 子弹类
class Bullet {
  constructor(tower, target, mode, prevTarget) {
    this.x = tower.x;
    this.y = tower.y;
    this.target = target;
    this.mode = mode;
    this.prevTarget = prevTarget;
    this.dead = false;
    this.chainIndex = prevTarget ? -1 : 0;
  }
  
  draw() {
    const size = GRID_SIZE * 0.12;
    
    // 绘制闪电链
    if (this.prevTarget && !this.prevTarget.dead) {
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(this.prevTarget.x, this.prevTarget.y);
      // 绘制折线闪电
      const midX = (this.prevTarget.x + this.x) / 2 + (Math.random() - 0.5) * 20;
      const midY = (this.prevTarget.y + this.y) / 2 + (Math.random() - 0.5) * 20;
      ctx.lineTo(midX, midY);
      ctx.lineTo(this.x, this.y);
      ctx.stroke();
    }
    
    if (this.mode === 'thunder') {
      // 雷电球有拖尾效果
      ctx.shadowColor = '#a855f7';
      ctx.shadowBlur = 10;
    }
    
    ctx.fillStyle = this.mode === 'slow' ? '#38bdf8' : (this.mode === 'thunder' ? '#a855f7' : '#fbbf24');
    ctx.beginPath();
    ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.shadowBlur = 0;
  }
  
  update() {
    if (!this.target || this.target.dead) {
      this.dead = true;
      return;
    }
    
    const dx = this.target.x - this.x;
    const dy = this.target.y - this.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    
    this.x += (dx / d) * (this.mode === 'thunder' ? 6 : 4);
    this.y += (dy / d) * (this.mode === 'thunder' ? 6 : 4);
    
    if (d < GRID_SIZE * 0.2) {
      if (this.mode === 'slow') {
        this.target.slowed = true;
        this.target.slowTimer = 120;
        this.target.hp -= 8; // 冰冻炮伤害为爆发炮的1/3
      } else if (this.mode === 'thunder') {
        // 雷电伤害递减
        const damage = 20 - this.chainIndex * 5;
        this.target.hp -= Math.max(damage, 5);
      } else {
        this.target.hp -= 25;
      }
      this.dead = true;
    }
  }
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function selectTower(mode) {
  selectedTower = mode;
  if (mode === 'slow') selectedCost = 40;
  else if (mode === 'burst') selectedCost = 60;
  else if (mode === 'thunder') selectedCost = 80;
  
  document.querySelectorAll('.tower-btn').forEach(btn => {
    btn.classList.remove('selected');
    if (btn.dataset.mode === mode) {
      btn.classList.add('selected');
    }
  });
}

// 点击放置/拆除炮台
canvas.onclick = (e) => {
  const grid = getGridPos(e.clientX, e.clientY);
  
  if (selectedTower === 'remove') {
    const towerIndex = towers.findIndex(t => t.col === grid.col && t.row === grid.row);
    if (towerIndex !== -1) {
      towers.splice(towerIndex, 1);
    }
    return;
  }
  
  if (!canPlaceTower(grid.col, grid.row)) {
    return;
  }
  
  if (towers.some(t => t.col === grid.col && t.row === grid.row)) {
    return;
  }
  
  if (energy >= selectedCost) {
    towers.push(new Tower(grid.col, grid.row, selectedTower));
    energy -= selectedCost;
    stats.energyUsed += selectedCost;
    stats.towersBuilt++;
    document.getElementById('energy').textContent = energy;
  }
};

canvas.onmousemove = (e) => {
  const grid = getGridPos(e.clientX, e.clientY);
  towers.forEach(t => t.showRange = false);
  const hoveredTower = towers.find(t => t.col === grid.col && t.row === grid.row);
  if (hoveredTower) {
    hoveredTower.showRange = true;
  }
};

// 触摸支持
canvas.ontouchstart = (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const grid = getGridPos(touch.clientX, touch.clientY);
  
  if (selectedTower === 'remove') {
    const towerIndex = towers.findIndex(t => t.col === grid.col && t.row === grid.row);
    if (towerIndex !== -1) {
      towers.splice(towerIndex, 1);
    }
    return;
  }
  
  if (!canPlaceTower(grid.col, grid.row)) {
    return;
  }
  
  if (towers.some(t => t.col === grid.col && t.row === grid.row)) {
    return;
  }
  
  if (energy >= selectedCost) {
    towers.push(new Tower(grid.col, grid.row, selectedTower));
    energy -= selectedCost;
    stats.energyUsed += selectedCost;
    stats.towersBuilt++;
    document.getElementById('energy').textContent = energy;
  }
};

function spawnEnemy() {
  // 倒计时中不生成怪物
  if (countdownActive) return;
  
  if (enemiesThisWave < totalEnemiesThisWave) {
    // 前两波只生成普通怪
    const forcedType = wave <= 2 ? 'normal' : null;
    enemies.push(new Enemy(forcedType));
    enemiesThisWave++;
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  drawGrid();
  drawPath();
  drawPlaceableCells();
  
  towers.forEach(t => { t.draw(); });
  
  // 游戏未开始时只绘制界面
  if (!gameStarted) {
    requestAnimationFrame(render);
    return;
  }
  
  towers.forEach(t => { t.update(); });
  enemies.forEach(e => { e.update(); e.draw(); });
  bullets.forEach(b => { b.update(); b.draw(); });
  
  bullets = bullets.filter(b => !b.dead);
  
  enemies = enemies.filter(e => {
    if (e.hp <= 0) {
      energy += e.reward;
      document.getElementById('energy').textContent = energy;
      // 更新杀敌统计
      stats.kills++;
      switch(e.type) {
        case 'normal': stats.normalKills++; break;
        case 'fast': stats.fastKills++; break;
        case 'tough': stats.toughKills++; break;
        case 'ghost': stats.ghostKills++; break;
        case 'berserker': stats.berserkerKills++; break;
      }
      return false;
    }
    if (e.pathIndex >= PATH.length) {
      return false;
    }
    return true;
  });
  
  // 倒计时逻辑（使用时间戳确保准确5秒）
  if (countdownActive) {
    const remaining = Math.max(0, Math.ceil((countdownEndTime - Date.now()) / 1000));
    if (remaining <= 0) {
      countdownActive = false;
    }
  }
  
  waveTimer++;
  if (waveTimer >= 90 && !countdownActive) {
    spawnEnemy();
    waveTimer = 0;
  }
  
  if (enemiesThisWave >= totalEnemiesThisWave && enemies.length === 0) {
    wave++;
    enemiesThisWave = 0;
    totalEnemiesThisWave = 5 + wave * 2;
    energy += 30;
    document.getElementById('energy').textContent = energy;
    document.getElementById('wave').textContent = wave;
    // 新波次开始，重置倒计时（5秒）
    countdownEndTime = Date.now() + COUNTDOWN_SECONDS * 1000;
    countdownActive = true;
  }
  
  // 绘制倒计时
  if (countdownActive) {
    const start = PATH[0];
    const x = start.col * GRID_SIZE + GRID_SIZE / 2;
    const y = start.row * GRID_SIZE + GRID_SIZE / 2;
    const seconds = Math.max(0, Math.ceil((countdownEndTime - Date.now()) / 1000));
    
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.beginPath();
    ctx.arc(x, y, GRID_SIZE * 0.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#fbbf24';
    ctx.font = `bold ${GRID_SIZE * 0.4}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(seconds, x, y);
  }
  
  if (lives <= 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 显示统计信息
    document.getElementById('stats-overlay').style.display = 'flex';
    document.getElementById('stat-wave').textContent = wave;
    document.getElementById('stat-kills').textContent = stats.kills;
    document.getElementById('stat-towers').textContent = stats.towersBuilt;
    document.getElementById('stat-energy').textContent = stats.energyUsed;
    document.getElementById('stat-normal').textContent = stats.normalKills;
    document.getElementById('stat-fast').textContent = stats.fastKills;
    document.getElementById('stat-tough').textContent = stats.toughKills;
    document.getElementById('stat-ghost').textContent = stats.ghostKills;
    document.getElementById('stat-berserker').textContent = stats.berserkerKills;
    
    gameOver = true;
    return;
  }
  
  requestAnimationFrame(render);
}

// 初始化
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// 显示开始界面
document.getElementById('start-overlay').style.display = 'flex';

// 开始游戏
function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  gameStarted = true;
  gameOver = false;
  countdownEndTime = Date.now() + COUNTDOWN_SECONDS * 1000;
  countdownActive = true;
  requestAnimationFrame(render);
}

// 重新开始游戏
function restartGame() {
  towers = [];
  enemies = [];
  bullets = [];
  energy = 100;
  lives = 10;
  wave = 1;
  waveTimer = 0;
  enemiesThisWave = 0;
  totalEnemiesThisWave = 5;
  gameOver = false;
  gameStarted = false;
  countdownEndTime = Date.now() + COUNTDOWN_SECONDS * 1000;
  countdownActive = true;
  
  // 重置统计数据
  stats = {
    kills: 0,
    normalKills: 0,
    fastKills: 0,
    toughKills: 0,
    ghostKills: 0,
    berserkerKills: 0,
    towersBuilt: 0,
    energyUsed: 0
  };
  
  document.getElementById('energy').textContent = energy;
  document.getElementById('lives').textContent = lives;
  document.getElementById('wave').textContent = wave;
  document.getElementById('stats-overlay').style.display = 'none';
  document.getElementById('start-overlay').style.display = 'flex';
  
  requestAnimationFrame(render);
  startGame()
}
</script>
