let currentBook = '';
let currentChapter = '';
let currentExplanation = '';
let currentFormattedText = '';
let currentAudioUrl = '';
let isRequesting = false;

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function onBookChange() {
  const bookSelect = document.getElementById('bookSelect');
  const chapterSelect = document.getElementById('chapterSelect');
  const selectedBook = bookSelect.value;
  if (!selectedBook) {
    chapterSelect.innerHTML = '<option value="">-- 请先选择书籍 --</option>';
    chapterSelect.disabled = true;
    return;
  }
  const bookData = BOOK_DATA[selectedBook];
  let options = '<option value="">-- 选择章节 --</option>';
  for (const [num, title] of Object.entries(bookData.chapters)) {
    options += `<option value="${num}">${title}</option>`;
  }
  chapterSelect.innerHTML = options;
  chapterSelect.disabled = false;
  currentBook = selectedBook;
  currentChapter = '';
}

function getSystemPrompt(chapterNum) {
  const bookData = BOOK_DATA[currentBook];
  const chapter = bookData.chapters[chapterNum];
  const bookName = bookData.name;
  return `你是一位幽默风趣的古籍解读专家，擅长用现代、通俗、接地气的语言解读古典名著。

**任务**：
请用幽默风趣、通俗易懂的语言，详细解读《${bookName}》${chapter}的内容。

**风格要求**：
1. 语言幽默诙谐，适当使用网络流行语和调侃语气
2. 讲解要通俗，让现代人也能轻松理解
3. 可以加入适当的吐槽和点评
4. 对人物心理和行为进行有趣的解读
5. 可以联系现代生活做类比
6. 内容越详细越好，尽可能展开讲解

**格式要求**：
1. 先整体介绍本章大致情节
2. 然后分段详细讲解，重点解读人物关系和心理
3. **重要**：在适当的时候，要说明该人物的性格特点和主要特征
4. 最后可以来个总结吐槽
5. 不要标题，直接开始讲解，不要有任何引导性内容`;
}

async function fetchExplanation() {
  if (!API_URL) { showToast('请先在代码中配置 API_URL'); return; }
  if (!currentBook) { showToast('请先选择书籍'); return; }
  const chapterNum = document.getElementById('chapterSelect').value;
  if (!chapterNum) { showToast('请先选择章节'); return; }
  if (isRequesting) { showToast('请求中，请稍候...'); return; }
  isRequesting = true;
  currentChapter = chapterNum;

  const btn = document.getElementById('getBtn');
  const explanationText = document.getElementById('explanationText');
  const copyBtn = document.getElementById('copyBtn');
  const voiceBtn = document.getElementById('voiceBtn');
  const audioSection = document.getElementById('audioSection');
  const formattedSection = document.getElementById('formattedSection');

  btn.disabled = true;
  btn.textContent = '⏳ 解读中...';
  explanationText.innerHTML = '<div class="placeholder"><span style="font-size: 48px;">📜</span><span>正在为您趣解古籍...</span></div>';
  copyBtn.classList.add('hidden');
  voiceBtn.classList.add('hidden');
  audioSection.classList.remove('show');
  formattedSection.classList.remove('show');
  currentExplanation = '';

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: API_HEADER,
      body: JSON.stringify({
        "model": "glm-4.7-flash",
        "messages": [
          { "role": "system", "content": getSystemPrompt(chapterNum) },
          { "role": "user", "content": `请解读《${BOOK_DATA[currentBook].name}》${BOOK_DATA[currentBook].chapters[chapterNum]}` }
        ],
        "stream": true,
        "thinking": { "type": "disabled" },
        "max_tokens": 65536,
        "temperature": 1.0
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') {
            copyBtn.classList.remove('hidden');
            voiceBtn.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = '📖 重新解读';
            displayFormattedText();
            isRequesting = false;
            return;
          }
          try {
            const json = JSON.parse(data);
            const content = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
            if (content) {
              currentExplanation += content;
              explanationText.textContent = currentExplanation;
            }
          } catch (e) {}
        }
      }
    }
  } catch (error) {
    btn.disabled = false;
    btn.textContent = '📖 开始解读';
    console.error('Error:', error);
    explanationText.innerHTML = '<div class="placeholder"><span style="font-size: 48px;">💨</span><span>解读遇到了一些问题...</span></div>';
    showToast('请求失败');
    isRequesting = false;
  }
}

function copyText() {
  if (!currentExplanation) { showToast('暂无内容可复制'); return; }
  navigator.clipboard.writeText(currentExplanation).then(() => showToast('复制成功')).catch(() => showToast('复制失败'));
}

function formatText(text) {
  const chars = text.replace(/\s+/g, '');
  const lines = [];
  for (let i = 0; i < chars.length; i += 10) {
    lines.push(chars.slice(i, i + 10));
  }
  return lines.join('\n');
}

function displayFormattedText() {
  const formattedBox = document.getElementById('formattedBox');
  const formattedSection = document.getElementById('formattedSection');
  currentFormattedText = formatText(currentExplanation);
  formattedBox.innerHTML = currentFormattedText.split('\n').map(line => `<div class="line">${line}</div>`).join('');
  formattedSection.classList.add('show');
}

function copyFormattedText() {
  if (!currentFormattedText) { showToast('暂无内容可复制'); return; }
  navigator.clipboard.writeText(currentFormattedText).then(() => showToast('复制成功')).catch(() => showToast('复制失败'));
}

async function generateVoice() {
  if (!currentExplanation) { showToast('暂无内容可生成语音'); return; }
  if (isRequesting) { showToast('请求中，请稍候...'); return; }
  isRequesting = true;

  const voiceBtn = document.getElementById('voiceBtn');
  const audioSection = document.getElementById('audioSection');
  const audioEl = document.getElementById('audioEl');

  voiceBtn.disabled = true;
  voiceBtn.textContent = '⏳ 生成中...';
  showToast('⏳ 语音生成中...');

  try {
    const VOICE_API_URLS = [
      'https://tts.wangwangit.com/v1/audio/speech',
      'https://wnzctts.wnzc.workers.dev/v1/audio/speech'
    ];
    let audioBlob = null;
    for (const apiUrl of VOICE_API_URLS) {
      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input: currentExplanation, voice: 'zh-CN-XiaomengNeural', speed: 0.85, pitch: 0, style: 'general' })
        });
        if (response.ok) { audioBlob = await response.blob(); break; }
      } catch (e) { continue; }
    }
    if (!audioBlob) throw new Error('请求失败');
    if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
    currentAudioUrl = URL.createObjectURL(audioBlob);
    audioEl.src = currentAudioUrl;
    audioSection.classList.add('show');
    voiceBtn.disabled = false;
    voiceBtn.textContent = '🔊 重新生成';
    isRequesting = false;
  } catch (error) {
    console.error('Error:', error);
    showToast('语音生成失败');
    voiceBtn.disabled = false;
    voiceBtn.textContent = '🔊 生成音频';
    isRequesting = false;
  }
}

function downloadAudio() {
  if (!currentAudioUrl) { showToast('暂无音频可下载'); return; }
  const a = document.createElement('a');
  a.href = currentAudioUrl;
  a.download = `classic_${Date.now()}.mp3`;
  a.click();
  showToast('开始下载');
}
</script>
