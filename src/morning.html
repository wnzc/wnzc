<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日早安</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .main-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .card-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .card-header .sun {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .card-header h1 {
      font-size: 22px;
      color: #333;
      font-weight: 600;
    }

    .card-header .date {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .content-box {
      background: linear-gradient(135deg, #f8f4ff 0%, #fff5f5 100%);
      border-radius: 16px;
      padding: 24px;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-bottom: 20px;
    }

    .content-box .quote {
      font-size: 16px;
      line-height: 1.8;
      color: #555;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .content-box .placeholder {
      color: #aaa;
      font-size: 14px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .get-btn,
    .copy-btn,
    .voice-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .get-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .get-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .get-btn:active {
      transform: translateY(0);
    }

    .get-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .copy-btn {
      background: #555;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .copy-btn:hover {
      background: #666;
    }

    .copy-btn.hidden {
      opacity: 0.5;
      pointer-events: none;
    }

    .voice-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
    }

    .voice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
    }

    .voice-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .voice-btn.hidden {
      opacity: 0.5;
      pointer-events: none;
    }

    .audio-section {
      margin-top: 16px;
      display: none;
    }

    .audio-section.show {
      display: block;
    }

    .audio-section audio {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .download-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #555;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      background: #666;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }
      .main-card {
        padding: 24px 16px;
      }
      .card-header h1 {
        font-size: 18px;
      }
      .content-box {
        padding: 16px;
        min-height: 120px;
      }
      .content-box .quote {
        font-size: 14px;
      }
      .copy-btn,
      .voice-btn {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="javascript:history.go(-1)" class="back-btn">← 返回</a>

    <div class="main-card">
      <div class="card-header">
        <div class="sun">🌅</div>
        <h1>每日早安</h1>
        <div class="date" id="dateDisplay"></div>
      </div>

      <div class="content-box">
        <div class="quote" id="quoteText">
          <span class="placeholder">点击下方按钮，获取每日励志语录</span>
        </div>
      </div>

      <div class="btn-group">
        <button class="get-btn" id="getBtn" onclick="fetchQuote()">
          🌸 获取今日励志语
        </button>
        <button class="copy-btn hidden" id="copyBtn" onclick="copyText()">
          📋 复制
        </button>
        <button class="voice-btn hidden" id="voiceBtn" onclick="generateVoice()">
          🔊 生成语音
        </button>
      </div>

      <div class="audio-section" id="audioSection">
        <audio id="audioEl" controls></audio>
        <button class="download-btn" id="downloadBtn" onclick="downloadAudio()">
          ⬇️ 下载音频
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ==================== 接口配置（自行修改） ====================
    const API_URL = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
    const API_HEADER = {
      "Content-Type": "application/json",
      "Authorization": "Bearer 8cb5d6c44a984a22a143ead8ac510d2f.9adwosowpPiml1Nq"
    };
    // ============================================================

    let currentQuote = '';
    let currentAudioUrl = '';

    function updateDate() {
      const now = new Date();
      const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      document.getElementById('dateDisplay').textContent = getDatePrefix()
    }
    updateDate();

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function getDatePrefix() {
      const now = new Date();
      if (now.getHours() < 12) {
        return `${now.getFullYear()}年${String(now.getMonth() + 1).padStart(2, '0')}月${String(now.getDate()).padStart(2, '0')}日`;
      } else {
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        return `${tomorrow.getFullYear()}年${String(tomorrow.getMonth() + 1).padStart(2, '0')}月${String(tomorrow.getDate()).padStart(2, '0')}日`;
      }
    }

    function getAPIBody() {
      const dateStr = getDatePrefix();
      return {
        "model": "glm-4.7-flash",
        "messages": [
          {
            "role": "system",
            "content": "你是一位专业且温暖的早安文案创作者。请根据用户输入的日期，生成一段早安励志文案。\n\n**格式要求**：\n1. **开头固定**：'今天是[日期]，早安。'（日期格式：4月14日，星期二）\n2. **正文**：紧接着写一段简洁有力的励志话语\n3. **风格**：温暖治愈、积极向上、简短有力\n4. **主题**：自我成长、热爱生活、珍惜当下、勇敢前行等\n5. **长度**：总字数控制在60-80字之间\n6. **语气**：像朋友发微信一样自然，不要太正式\n\n**示例**：\n今天是4月14日，星期二，早安。\n生活有风有雨是常态，但请你相信，雨过天晴后，一定会有更好的风景等着你。做一个内心温暖的人，眼里有光，心中有爱，把每一天都过得热气腾腾。\n\n请直接输出文案，不要有标题或其他说明。"
          },{
            "role": "user",
            "content": dateStr
          }
        ],
        "stream": true,
        "thinking": {
          "type": "disabled"
        },
        "max_tokens": 65536,
        "temperature": 1.0
      };
    }

    async function fetchQuote() {
      if (!API_URL) {
        showToast('请先在代码中配置 API_URL');
        return;
      }

      const btn = document.getElementById('getBtn');
      const quoteText = document.getElementById('quoteText');
      const copyBtn = document.getElementById('copyBtn');
      const voiceBtn = document.getElementById('voiceBtn');
      const audioSection = document.getElementById('audioSection');

      btn.disabled = true;
      btn.textContent = '⏳ 思考中...';
      quoteText.textContent = '';
      copyBtn.classList.add('hidden');
      voiceBtn.classList.add('hidden');
      audioSection.classList.remove('show');
      currentQuote = '';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: API_HEADER,
          body: JSON.stringify(getAPIBody())
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') {
                copyBtn.classList.remove('hidden');
                voiceBtn.classList.remove('hidden');
                showToast('获取成功');
                btn.disabled = false;
                btn.textContent = '🌸 获取今日励志语';
                return;
              }
              try {
                const json = JSON.parse(data);
                const content = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
                if (content) {
                  currentQuote += content;
                  quoteText.textContent = currentQuote;
                }
              } catch (e) {}
            }
          }
        }
      } catch (error) {
        console.error('Error:', error);
        quoteText.innerHTML = '<span class="placeholder">请求失败，请检查接口配置</span>';
        showToast('请求失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '🌸 获取今日励志语';
      }
    }

    function copyText() {
      if (!currentQuote) {
        showToast('暂无内容可复制');
        return;
      }
      navigator.clipboard.writeText(currentQuote).then(() => {
        showToast('复制成功');
      }).catch(() => {
        showToast('复制失败');
      });
    }

    async function generateVoice() {
      if (!currentQuote) {
        showToast('暂无内容可生成语音');
        return;
      }

      const voiceBtn = document.getElementById('voiceBtn');
      const audioSection = document.getElementById('audioSection');
      const audioEl = document.getElementById('audioEl');

      voiceBtn.disabled = true;
      voiceBtn.textContent = '⏳ 生成中...';

      try {
        const VOICE_API_URLS = [
        'https://tts.wangwangit.com/v1/audio/speech',
        'https://wnzctts.wnzc.workers.dev/v1/audio/speech'
      ];

      let audioBlob = null;

      for (const apiUrl of VOICE_API_URLS) {
        try {
          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              input: currentQuote,
              voice: "zh-CN-XiaoqiuNeural",
              speed: 1.0,
              pitch: 0,
              style: "general"
            })
          });

          if (response.ok) {
            audioBlob = await response.blob();
            console.log(audioBlob)
            break;
          }
        } catch (e) {
          continue;
        }
      }

      if (!audioBlob) throw new Error('请求失败');

    //   if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
      currentAudioUrl = URL.createObjectURL(audioBlob);
      audioEl.src = currentAudioUrl;
      audioSection.classList.add('show');
      showToast('语音生成成功');

      voiceBtn.disabled = false;
      voiceBtn.textContent = '🔊 重新生成';
      } catch (error) {
        console.error('Error:', error);
        showToast('语音生成失败');
        voiceBtn.disabled = false;
        voiceBtn.textContent = '🔊 生成语音';
      }
    }

    function downloadAudio() {
      if (!currentAudioUrl) {
        showToast('暂无音频可下载');
        return;
      }
      const a = document.createElement('a');
      a.href = currentAudioUrl;
      a.download = `morning_${Date.now()}.mp3`;
      a.click();
      showToast('开始下载');
    }
  </script>
</body>
</html>
