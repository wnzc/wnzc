<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>答案之书</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a3a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* 星光闪烁 - 简化 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      perspective: 1500px;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: inherit;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 25px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* 封面状态 */
    .book-cover {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 50%, #1a1a3e 100%);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 
        0 0 0 2px rgba(255, 215, 0, 0.3),
        0 20px 60px rgba(0,0,0,0.5),
        0 0 60px rgba(138, 43, 226, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .book-cover:hover {
      transform: scale(1.03);
      box-shadow: 
        0 0 0 2px rgba(255, 215, 0, 0.5),
        0 25px 70px rgba(0,0,0,0.5),
        0 0 80px rgba(138, 43, 226, 0.4);
    }

    .book-cover::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20px;
      bottom: 20px;
      width: 25px;
      background: linear-gradient(90deg, #1a0a2e, #2d1b4e, #1a0a2e);
      border-radius: 4px 0 0 4px;
    }

    .cover-icon {
      font-size: 90px;
      margin-bottom: 25px;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
      position: relative;
      z-index: 1;
    }

    .cover-title {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700, #ff6b6b, #ffd700);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 15px;
      letter-spacing: 6px;
      position: relative;
      z-index: 1;
    }

    .cover-subtitle {
      font-size: 14px;
      color: rgba(255,215,0,0.8);
      letter-spacing: 8px;
      margin-bottom: 35px;
      position: relative;
      z-index: 1;
    }

    .cover-hint {
      font-size: 15px;
      color: rgba(138, 43, 226, 0.9);
      position: relative;
      z-index: 1;
    }

    /* 魔法粒子效果 */
    .magic-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: magicFloat 3s ease-out infinite;
    }

    @keyframes magicFloat {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100px) scale(0) rotate(360deg); opacity: 0; }
    }

    /* 书页内容 */
    .book-content {
      display: none;
    }

    .book-content.show {
      display: block;
    }

    .book-page {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      border-radius: 20px;
      padding: 45px 35px;
      color: #fff;
      box-shadow: 
        0 20px 50px rgba(0,0,0,0.5),
        0 0 0 2px rgba(138, 43, 226, 0.3);
      position: relative;
      overflow: hidden;
    }

    .book-page::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20px;
      bottom: 20px;
      width: 3px;
      background: linear-gradient(180deg, #ffd700, #ff6b6b, #ffd700);
    }

    .page-header {
      text-align: center;
      margin-bottom: 35px;
      position: relative;
      z-index: 1;
    }

    .page-title {
      font-size: 26px;
      background: linear-gradient(135deg, #ffd700, #ff6b6b, #ffd700);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .page-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 3px;
    }

    .question-input {
      width: 100%;
      padding: 18px;
      font-size: 16px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(138, 43, 226, 0.3);
      border-radius: 15px;
      color: #fff;
      margin-bottom: 22px;
      transition: all 0.4s ease;
      resize: none;
      height: 100px;
      position: relative;
      z-index: 1;
    }

    .question-input:focus {
      outline: none;
      border-color: rgba(138, 43, 226, 0.8);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.2), 0 0 30px rgba(138, 43, 226, 0.3);
    }

    .question-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .get-answer-btn {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f64f59 100%);
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(118, 75, 162, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .get-answer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(118, 75, 162, 0.5);
    }

    .get-answer-btn:active {
      transform: translateY(0);
    }

    .get-answer-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* 加载状态 */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 50px 0;
      position: relative;
      z-index: 1;
    }

    .loading.show {
      display: flex;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(138, 43, 226, 0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      color: rgba(255, 215, 0, 0.9);
    }

    /* 答案展示 */
    .answer-display {
      display: none;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .answer-display.show {
      display: block;
    }

    .answer-label {
      font-size: 14px;
      color: rgba(255, 215, 0, 0.8);
      margin-bottom: 20px;
      letter-spacing: 5px;
    }

    .answer-text {
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(135deg, #fff 0%, #ffd700 50%, #ff6b6b 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.6;
      margin-bottom: 35px;
      padding: 25px;
      background-color: rgba(138, 43, 226, 0.1);
      border-radius: 15px;
      border: 1px solid rgba(138, 43, 226, 0.3);
      position: relative;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .replay-btn, .back-cover-btn {
      padding: 14px 28px;
      font-size: 15px;
      font-family: inherit;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .replay-btn {
      color: #fff;
      background: linear-gradient(135deg, #667eea, #764ba2, #f64f59);
      box-shadow: 0 5px 20px rgba(118, 75, 162, 0.4);
    }

    .replay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(118, 75, 162, 0.5);
    }

    .back-cover-btn {
      color: #fff;
      background: transparent;
      border: 2px solid rgba(138, 43, 226, 0.6);
    }

    .back-cover-btn:hover {
      background: rgba(138, 43, 226, 0.2);
    }

    .hidden {
      display: none !important;
    }

    /* 打字机效果 */
    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #ffd700;
      margin-left: 2px;
      animation: cursorBlink 0.8s infinite;
    }

    @keyframes cursorBlink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* 手机适配 */
    @media (max-width: 480px) {
      .cover-icon {
        font-size: 70px;
      }
      .cover-title {
        font-size: 28px;
        letter-spacing: 4px;
      }
      .cover-subtitle {
        font-size: 12px;
        letter-spacing: 4px;
      }
      .book-page {
        padding: 30px 20px;
      }
      .page-title {
        font-size: 22px;
      }
      .answer-text {
        font-size: 22px;
        padding: 20px;
      }
      .btn-group {
        flex-direction: column;
      }
      .replay-btn, .back-cover-btn {
        width: 100%;
      }
      /* 手机上减少星星数量 */
      .star {
        opacity: 0.4;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <a href="javascript:history.go(-1)" class="back-btn">
    <span>←</span>
    <span>返回首页</span>
  </a>

  <div class="container">
    <!-- 封面 -->
    <div class="book-cover" id="bookCover">
      <div class="cover-icon">📖</div>
      <div class="cover-title">答案之书</div>
      <div class="cover-subtitle">THE ANSWER BOOK</div>
      <div class="cover-hint">点击翻开探索答案</div>
    </div>

    <!-- 内容页 -->
    <div class="book-content" id="bookContent">
      <div class="book-page" id="bookPage">
        <div class="page-header">
          <div class="page-title">✧ 命运的指引 ✧</div>
          <div class="page-subtitle">闭上眼睛，心中默念你的问题</div>
        </div>

        <div class="input-section" id="inputSection">
          <textarea 
            class="question-input" 
            id="questionInput" 
            placeholder="在这里输入你的问题..."
          ></textarea>
          <button class="get-answer-btn" id="getAnswerBtn">
            <span>🔮</span>
            <span>寻找答案</span>
          </button>
        </div>

        <div class="loading" id="loading">
          <div class="loading-spinner"></div>
          <div class="loading-text">命运正在揭晓...</div>
        </div>

        <div class="answer-display" id="answerDisplay">
          <div class="answer-label">✦ 答案 ✦</div>
          <div class="answer-text" id="answerText"></div>
          <div class="btn-group">
            <button class="replay-btn" id="replayBtn">再问一次</button>
            <button class="back-cover-btn" id="backCoverBtn">合上书</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 生成星星背景 - 简化版
    function createStars() {
      const container = document.getElementById('stars');
      const isMobile = window.innerWidth <= 480;
      const count = isMobile ? 30 : 50; // 手机减少星星数量
      
      for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        const size = Math.random() * 2 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        container.appendChild(star);
      }
    }

    // 打字机效果
    function typeWriter(element, text, speed = 50) {
      let i = 0;
      element.innerHTML = '';
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';
      
      function type() {
        if (i < text.length) {
          element.innerHTML = text.substring(0, i + 1);
          element.appendChild(cursor);
          i++;
          setTimeout(type, speed + Math.random() * 30);
        } else {
          setTimeout(() => cursor.remove(), 1000);
        }
      }
      type();
    }

    createStars();

    const API_KEY = 'ak_4e467bef570aafa08c488b57bd3c54946e25f2b0ff2064a1';
    const API_URL = 'https://v1.uuhb.cn/v1/answerbook';

    const bookCover = document.getElementById('bookCover');
    const bookContent = document.getElementById('bookContent');
    const bookPage = document.getElementById('bookPage');
    const inputSection = document.getElementById('inputSection');
    const loading = document.getElementById('loading');
    const answerDisplay = document.getElementById('answerDisplay');
    const answerText = document.getElementById('answerText');
    const getAnswerBtn = document.getElementById('getAnswerBtn');
    const replayBtn = document.getElementById('replayBtn');
    const backCoverBtn = document.getElementById('backCoverBtn');
    const questionInput = document.getElementById('questionInput');

    // 翻开书
    function openBook() {
      bookCover.classList.add('hidden');
      bookContent.classList.add('show');
      questionInput.focus();
    }

    // 合上书
    function closeBook() {
      bookContent.classList.remove('show');
      bookCover.classList.remove('hidden');
      answerDisplay.classList.remove('show');
      inputSection.style.display = 'block';
      questionInput.value = '';
      questionInput.focus();
    }

    // 获取答案
    async function getAnswer() {
      const question = questionInput.value.trim();
      
      inputSection.style.display = 'none';
      loading.classList.add('show');

      try {
        const url = `${API_URL}?apiKey=${API_KEY}&question=${encodeURIComponent(question)}`;
        const response = await fetch(url);
        const result = await response.json();

        if (result.success && result.data) {
          loading.classList.remove('show');
          answerDisplay.classList.add('show');
          // 打字机效果显示答案
          setTimeout(() => {
            typeWriter(answerText, result.data.answer, 60);
          }, 300);
        } else {
          alert('获取答案失败，请重试');
          loading.classList.remove('show');
          inputSection.style.display = 'block';
        }
      } catch (error) {
        console.error('API Error:', error);
        alert('网络请求失败，请检查网络后重试');
        loading.classList.remove('show');
        inputSection.style.display = 'block';
      }
    }

    // 再问一次
    function replay() {
      answerDisplay.classList.remove('show');
      inputSection.style.display = 'block';
      questionInput.value = '';
      questionInput.focus();
    }

    // 事件绑定
    bookCover.addEventListener('click', openBook);
    backCoverBtn.addEventListener('click', closeBook);
    getAnswerBtn.addEventListener('click', getAnswer);
    replayBtn.addEventListener('click', replay);

    // 支持回车键提交
    questionInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        getAnswer();
      }
    });
  </script>
</body>
</html>
