<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翻牌记忆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            touch-action: manipulation;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 320px;
        }
        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card:active { transform: scale(0.95); }
        .card.flipped {
            background: white;
            transform: rotateY(180deg);
        }
        .card.matched {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            pointer-events: none;
        }
        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1rem;
            background: white;
            color: #f5576c;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .win-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        .win-modal.show { display: flex; }
        .win-modal h2 { font-size: 2rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="hud">
        <span>⏱️ <span id="time">0</span>秒</span>
        <span>🎯 <span id="pairs">0</span>/8</span>
    </div>
    <div class="grid" id="grid"></div>
    <button class="btn" onclick="init()">重新开始</button>
    
    <div class="win-modal" id="winModal">
        <h2>🎉 太厉害了!</h2>
        <p id="winTime"></p>
        <button class="btn" onclick="init()">再玩一次</button>
    </div>

    <script>
        const emojis = ['🐶','🐱','🐼','🦊','🦁','🐸','🐰','🐻'];
        let cards = [], flipped = [], matched = 0, timer = null, startTime = 0;

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function init() {
            document.getElementById('winModal').classList.remove('show');
            cards = shuffle([...emojis, ...emojis]);
            flipped = [];
            matched = 0;
            document.getElementById('pairs').textContent = '0';
            clearInterval(timer);
            startTime = Date.now();
            timer = setInterval(() => {
                document.getElementById('time').textContent = Math.floor((Date.now() - startTime) / 1000);
            }, 1000);
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = cards.map((e, i) => `
                <div class="card${flipped.includes(i) ? ' flipped' : ''}${cards[i] === 'done' ? ' matched' : ''}" data-i="${i}" onclick="flip(${i})">
                    ${flipped.includes(i) || cards[i] === 'done' ? e : '❓'}
                </div>
            `).join('');
        }

        function flip(i) {
            if (flipped.length >= 2 || flipped.includes(i) || cards[i] === 'done') return;
            
            flipped.push(i);
            render();

            if (flipped.length === 2) {
                if (cards[flipped[0]] === cards[flipped[1]]) {
                    cards[flipped[0]] = 'done';
                    cards[flipped[1]] = 'done';
                    matched++;
                    document.getElementById('pairs').textContent = matched;
                    flipped = [];
                    render();
                    
                    if (matched === 8) {
                        clearInterval(timer);
                        const elapsed = Math.floor((Date.now() - startTime) / 1000);
                        document.getElementById('winTime').textContent = `用时: ${elapsed}秒`;
                        setTimeout(() => document.getElementById('winModal').classList.add('show'), 300);
                    }
                } else {
                    setTimeout(() => {
                        flipped = [];
                        render();
                    }, 800);
                }
            }
        }

        init();
    </script>
</body>
</html>
