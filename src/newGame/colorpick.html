<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>颜色识别 - 游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #232526, #414345);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #fff;
            overflow: hidden;
        }
        h1 { font-size: 1.3rem; margin-bottom: 5px; }
        .header {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box .label { font-size: 0.55rem; opacity: 0.8; }
        .stat-box .value { font-size: 1rem; font-weight: bold; }
        .controls {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        button {
            padding: 5px 12px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
        .timer-bar {
            width: 100%;
            max-width: 300px;
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ECDC4, #2ECC71);
            transition: width 0.1s linear;
        }
        .game-area {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            min-width: 280px;
        }
        .color-word {
            font-size: 2rem;
            font-weight: bold;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .option-btn {
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .option-btn:active { transform: scale(0.95); }
        .option-btn.wrong {
            animation: shake 0.3s;
            opacity: 0.5;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .question {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 15px;
        }
        .game-over {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .game-over h2 { font-size: 1.6rem; margin-bottom: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h1>🎨 颜色识别</h1>
    <div class="header">
        <div class="stat-box">
            <div class="label">得分</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="label">最高</div>
            <div class="value" id="high">0</div>
        </div>
    </div>
    <div class="controls">
        <button onclick="location.href='index.html'">← 返回</button>
        <button onclick="startGame()">重新开始</button>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
    <div class="game-area">
        <div class="question" id="question">选择文字的实际颜色</div>
        <div class="color-word" id="colorWord">红色</div>
        <div class="options" id="options"></div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>⏰ 时间到！</h2>
        <p style="font-size:2rem;margin:10px 0">得分: <span id="finalScore">0</span></p>
        <p style="margin-bottom:15px;opacity:0.8">最高: <span id="record">0</span></p>
        <button onclick="startGame()">再来一局</button>
    </div>

    <script>
        const COLORS = [
            { name: '红色', color: '#FF0000' },
            { name: '蓝色', color: '#0066FF' },
            { name: '绿色', color: '#00AA00' },
            { name: '黄色', color: '#FFFF00' },
            { name: '紫色', color: '#9900FF' },
            { name: '橙色', color: '#FF8800' },
            { name: '粉色', color: '#FF69B4' },
            { name: '棕色', color: '#8B4513' },
            { name: '白色', color: '#FFFFFF' },
            { name: '黑色', color: '#000000' }
        ];
        
        const GAME_TIME = 30;
        let score, timeLeft, gameRunning;
        let currentAnswer, timerInterval;
        let high = parseInt(localStorage.getItem('colorHigh') || '0');
        
        document.getElementById('high').textContent = high;
        
        function startGame() {
            document.getElementById('gameOver').classList.add('hidden');
            score = 0;
            timeLeft = GAME_TIME;
            gameRunning = true;
            
            document.getElementById('score').textContent = score;
            document.getElementById('timer').style.width = '100%';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').style.width = (timeLeft / GAME_TIME * 100) + '%';
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            nextQuestion();
        }
        
        function nextQuestion() {
            const wordIdx = Math.floor(Math.random() * COLORS.length);
            let colorIdx;
            
            // 确保颜色名称和实际颜色不同
            do {
                colorIdx = Math.floor(Math.random() * COLORS.length);
            } while (colorIdx === wordIdx);
            
            currentAnswer = COLORS[colorIdx];
            
            const colorWord = document.getElementById('colorWord');
            colorWord.textContent = COLORS[wordIdx].name;
            colorWord.style.color = currentAnswer.color;
            colorWord.style.background = 'rgba(0,0,0,0.2)';
            
            // 生成选项
            const options = [currentAnswer];
            const usedColors = new Set([colorIdx]);
            
            while (options.length < 4) {
                const idx = Math.floor(Math.random() * COLORS.length);
                if (!usedColors.has(idx)) {
                    usedColors.add(idx);
                    options.push(COLORS[idx]);
                }
            }
            
            // 打乱选项
            options.sort(() => Math.random() - 0.5);
            
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.name;
                btn.style.background = opt.color;
                btn.style.color = opt.color === '#FFFF00' || opt.color === '#FFFFFF' ? '#333' : '#fff';
                btn.style.boxShadow = `0 4px 10px ${opt.color}40`;
                btn.onclick = () => selectAnswer(opt, btn);
                optionsEl.appendChild(btn);
            });
        }
        
        function selectAnswer(selected, btnEl) {
            if (!gameRunning) return;
            
            if (selected === currentAnswer) {
                score++;
                document.getElementById('score').textContent = score;
                if (score > high) {
                    high = score;
                    localStorage.setItem('colorHigh', high);
                    document.getElementById('high').textContent = high;
                }
                btnEl.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    btnEl.style.transform = '';
                    nextQuestion();
                }, 200);
            } else {
                btnEl.classList.add('wrong');
                btnEl.style.opacity = '0.3';
            }
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('record').textContent = high;
            document.getElementById('gameOver').classList.remove('hidden');
        }
        
        startGame();
    </script>
</body>
</html>
