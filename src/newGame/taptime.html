<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>节奏点击</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: manipulation;
        }
        .beat-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        .beat-circle:active { transform: scale(0.95); }
        .beat-circle::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 4px solid white;
            border-radius: 50%;
            opacity: 0.5;
        }
        .beat-circle .ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid white;
            border-radius: 50%;
            animation: ripple 0.5s forwards;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .hud {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 300px;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .combo {
            position: fixed;
            font-size: 2rem;
            color: white;
            font-weight: bold;
            pointer-events: none;
            animation: comboAnim 0.5s forwards;
        }
        @keyframes comboAnim {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
        }
        .bpm-display {
            color: white;
            font-size: 1rem;
            margin-top: 20px;
            opacity: 0.8;
        }
        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        .game-over.show { display: flex; }
        .game-over h1 { font-size: 2rem; margin-bottom: 20px; }
        .result-stat { font-size: 1.2rem; margin: 10px 0; }
        .result-stat span { color: #38ef7d; font-size: 1.5rem; }
        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.1rem;
            background: white;
            color: #11998e;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hud">
        <span>💯 <span id="score">0</span></span>
        <span>🎵 <span id="bpm">120</span> BPM</span>
    </div>
    
    <div class="beat-circle" id="beatCircle" ontouchstart="tap()" onclick="tap()">
        👆
    </div>
    
    <div class="bpm-display">跟随节拍点击! 🎶</div>
    
    <div class="game-over" id="gameOver">
        <h1>🎉 时间到!</h1>
        <div class="result-stat">得分: <span id="finalScore">0</span></div>
        <div class="result-stat">完美: <span id="perfectCount">0</span></div>
        <div class="result-stat">连击: <span id="maxCombo">0</span></div>
        <div class="result-stat">准确率: <span id="accuracy">0</span>%</div>
        <button class="btn" onclick="startGame()">再来一次</button>
    </div>

    <script>
        const circle = document.getElementById('beatCircle');
        let score = 0, combo = 0, maxCombo = 0;
        let perfectCount = 0, totalTaps = 0;
        let bpm = 120, beatInterval, lastBeat, nextBeat;
        let timeLeft = 30, timer = null, isPlaying = false;

        function startGame() {
            document.getElementById('gameOver').classList.remove('show');
            score = 0;
            combo = 0;
            maxCombo = 0;
            perfectCount = 0;
            totalTaps = 0;
            timeLeft = 30;
            isPlaying = true;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '30';
            
            // Calculate beat timing
            const beatMs = 60000 / bpm;
            lastBeat = Date.now();
            nextBeat = lastBeat + beatMs;
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                
                // Speed up slightly
                if (timeLeft === 20) {
                    bpm = 130;
                    document.getElementById('bpm').textContent = bpm;
                } else if (timeLeft === 10) {
                    bpm = 140;
                    document.getElementById('bpm').textContent = bpm;
                }
                
                if (timeLeft <= 0) endGame();
            }, 1000);
            
            beatLoop();
        }

        function beatLoop() {
            if (!isPlaying) return;
            
            const now = Date.now();
            if (now >= nextBeat) {
                // Pulse effect
                circle.style.transform = 'scale(1.1)';
                setTimeout(() => circle.style.transform = '', 100);
                lastBeat = nextBeat;
                nextBeat = lastBeat + (60000 / bpm);
            }
            
            requestAnimationFrame(beatLoop);
        }

        function tap() {
            if (!isPlaying) return;
            totalTaps++;
            
            // Ripple effect
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            circle.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
            
            const now = Date.now();
            const timeSinceLastBeat = now - lastBeat;
            const timeToNextBeat = nextBeat - now;
            const halfBeat = 30000 / bpm;
            
            // Check timing
            let points = 0;
            let text = '';
            
            if (timeSinceLastBeat < halfBeat) {
                // Tapped after last beat
                const offset = timeSinceLastBeat;
                if (offset < 50) {
                    points = 50;
                    perfectCount++;
                    combo++;
                    text = 'PERFECT! 🎯';
                } else if (offset < 100) {
                    points = 30;
                    combo++;
                    text = 'Great! ⭐';
                } else {
                    points = 10;
                    combo = 0;
                    text = 'OK';
                }
            } else if (timeToNextBeat < halfBeat) {
                // Tapped before next beat
                const offset = timeToNextBeat;
                if (offset < 50) {
                    points = 50;
                    perfectCount++;
                    combo++;
                    text = 'PERFECT! 🎯';
                } else if (offset < 100) {
                    points = 30;
                    combo++;
                    text = 'Great! ⭐';
                } else {
                    points = 10;
                    combo = 0;
                    text = 'OK';
                }
            } else {
                combo = 0;
                text = 'Miss 💨';
            }
            
            maxCombo = Math.max(maxCombo, combo);
            score += points * (1 + Math.floor(combo / 5) * 0.5);
            document.getElementById('score').textContent = Math.floor(score);
            
            // Show feedback
            const fb = document.createElement('div');
            fb.className = 'combo';
            fb.textContent = text;
            fb.style.left = (window.innerWidth / 2 - 60) + 'px';
            fb.style.top = (window.innerHeight / 2 - 100) + 'px';
            document.body.appendChild(fb);
            setTimeout(() => fb.remove(), 500);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timer);
            
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('perfectCount').textContent = perfectCount;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('accuracy').textContent = totalTaps > 0 ? Math.round(perfectCount / totalTaps * 100) : 0;
            
            setTimeout(() => {
                document.getElementById('gameOver').classList.add('show');
            }, 500);
        }

        startGame();
    </script>
</body>
</html>
