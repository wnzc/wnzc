<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: #fff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .label { font-size: 0.75rem; opacity: 0.8; }
        .stat-box .value { font-size: 1.3rem; font-weight: bold; }
        .stat-box .value.score { color: #4ECDC4; }
        .stat-box .value.high { color: #FFD93D; }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); }
        .back-btn { background: rgba(255, 255, 255, 0.15); }
        .game-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        #gameCanvas {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }
        .controls-mobile {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 5px;
            margin-top: 10px;
        }
        .ctrl-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            font-size: 1.5rem;
            color: #fff;
            cursor: pointer;
        }
        .ctrl-btn:active { background: rgba(255, 255, 255, 0.4); }
        .ctrl-up { grid-area: up; }
        .ctrl-down { grid-area: down; }
        .ctrl-left { grid-area: left; }
        .ctrl-right { grid-area: right; }
        .game-over, .win {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .game-over h2 { color: #FF6B6B; font-size: 2rem; }
        .win h2 { color: #4ECDC4; font-size: 2rem; }
        .hidden { display: none !important; }
        @media (min-width: 500px) {
            .controls-mobile { display: none; }
        }
    </style>
</head>
<body>
    <h1>贪吃蛇</h1>
    <div class="header">
        <div class="stat-box">
            <div class="label">得分</div>
            <div class="value score" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="label">最高</div>
            <div class="value high" id="highScore">0</div>
        </div>
    </div>
    <div class="controls">
        <button class="back-btn" onclick="location.href='index.html'">← 返回主页</button>
        <button onclick="initGame()">重新开始</button>
    </div>
    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="controls-mobile">
        <button class="ctrl-btn ctrl-up" onclick="setDirection(0, -1)">↑</button>
        <button class="ctrl-btn ctrl-left" onclick="setDirection(-1, 0)">←</button>
        <button class="ctrl-btn ctrl-right" onclick="setDirection(1, 0)">→</button>
        <button class="ctrl-btn ctrl-down" onclick="setDirection(0, 1)">↓</button>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>💀 游戏结束</h2>
        <p style="margin: 15px 0;">得分: <span id="finalScore">0</span></p>
        <button onclick="initGame()">再试一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gridSize = 20;
        let cols, rows;
        let snake, food, direction, nextDirection;
        let score, highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
        let gameLoop, gameRunning;
        
        function resizeCanvas() {
            const maxSize = Math.min(window.innerWidth - 30, 400);
            canvas.width = maxSize;
            canvas.height = maxSize;
            gridSize = Math.floor(maxSize / 20);
            cols = Math.floor(canvas.width / gridSize);
            rows = Math.floor(canvas.height / gridSize);
        }
        
        function initGame() {
            resizeCanvas();
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOver').classList.add('hidden');
            
            snake = [
                { x: Math.floor(cols / 2), y: Math.floor(rows / 2) },
                { x: Math.floor(cols / 2) - 1, y: Math.floor(rows / 2) },
                { x: Math.floor(cols / 2) - 2, y: Math.floor(rows / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            document.getElementById('score').textContent = score;
            
            placeFood();
            gameRunning = true;
            clearInterval(gameLoop);
            gameLoop = setInterval(update, 120);
        }
        
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * cols),
                    y: Math.floor(Math.random() * rows)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }
        
        function update() {
            if (!gameRunning) return;
            
            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            // 穿墙
            head.x = (head.x + cols) % cols;
            head.y = (head.y + rows) % rows;
            
            // 撞到自己
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 蛇身
            snake.forEach((s, i) => {
                const gradient = ctx.createRadialGradient(
                    s.x * gridSize + gridSize / 2, s.y * gridSize + gridSize / 2, 0,
                    s.x * gridSize + gridSize / 2, s.y * gridSize + gridSize / 2, gridSize / 2
                );
                gradient.addColorStop(0, i === 0 ? '#4ECDC4' : '#45B7AA');
                gradient.addColorStop(1, i === 0 ? '#26A69A' : '#2E8B84');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2, 4);
                ctx.fill();
            });
            
            // 食物
            ctx.fillStyle = '#FF6B6B';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function setDirection(dx, dy) {
            if (gameRunning && (dx !== -direction.x || dy !== -direction.y)) {
                nextDirection = { x: dx, y: dy };
            }
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHigh', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }
        
        // 键盘控制
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') setDirection(0, -1);
            if (e.key === 'ArrowDown' || e.key === 's') setDirection(0, 1);
            if (e.key === 'ArrowLeft' || e.key === 'a') setDirection(-1, 0);
            if (e.key === 'ArrowRight' || e.key === 'd') setDirection(1, 0);
        });
        
        window.addEventListener('resize', () => {
            if (gameRunning) {
                resizeCanvas();
                draw();
            }
        });
        
        initGame();
    </script>
</body>
</html>
