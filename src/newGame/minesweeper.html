<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷 - 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a4e69 0%, #22223b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
            min-width: 80px;
        }
        .stat-box .label {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .stat-box .value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .stat-box .value.danger { color: #ff6b6b; }
        .stat-box .value.safe { color: #4ecdc4; }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .difficulty-btns {
            display: flex;
            gap: 8px;
        }
        .diff-btn {
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 15px;
        }
        .diff-btn.active {
            background: linear-gradient(135deg, #4ECDC4, #44a08d);
        }
        .game-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
        }
        .game-board {
            display: grid;
            padding: 10px;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            flex-shrink: 0;
        }
        .cell {
            background: linear-gradient(145deg, #6c757d, #495057);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.1s;
            user-select: none;
        }
        .cell:hover:not(.revealed) {
            background: linear-gradient(145deg, #7c858d, #596067);
            transform: scale(1.05);
        }
        .cell:active:not(.revealed) {
            transform: scale(0.95);
        }
        .cell.revealed {
            background: #dee2e6;
            cursor: default;
            animation: reveal 0.2s ease;
        }
        .cell.mine {
            background: #ff6b6b;
            animation: explode 0.3s ease;
        }
        .cell.flag {
            background: linear-gradient(145deg, #ffd93d, #ffcd1d);
        }
        @keyframes reveal {
            0% { transform: scale(0.5); background: #6c757d; opacity: 0.5; }
            100% { transform: scale(1); background: #dee2e6; opacity: 1; }
        }
        @keyframes explode {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .cell[data-num="1"] { color: #007bff; }
        .cell[data-num="2"] { color: #28a745; }
        .cell[data-num="3"] { color: #dc3545; }
        .cell[data-num="4"] { color: #6f42c1; }
        .cell[data-num="5"] { color: #e83e8c; }
        .cell[data-num="6"] { color: #17a2b8; }
        .cell[data-num="7"] { color: #343a40; }
        .cell[data-num="8"] { color: #6c757d; }
        .game-over, .win {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .game-over h2 { color: #ff6b6b; font-size: 2.5rem; }
        .win h2 { color: #4ecdc4; font-size: 2.5rem; }
        .game-over p, .win p {
            margin: 15px 0;
            font-size: 1.2rem;
        }
        .hidden { display: none !important; }
        @media (max-width: 500px) {
            body { padding: 10px 5px; }
            h1 { font-size: 1.6rem; margin-bottom: 8px; }
            .header { gap: 8px; margin-bottom: 10px; }
            .stat-box { padding: 6px 12px; min-width: 60px; }
            .stat-box .label { font-size: 0.65rem; }
            .stat-box .value { font-size: 1rem; }
            .controls { gap: 6px; margin-bottom: 10px; }
            .diff-btn { padding: 5px 8px; font-size: 0.7rem; }
            .game-board { padding: 6px; }
            .cell { font-size: 0.75rem; }
            button { padding: 8px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1>扫雷</h1>
    <div class="header">
        <div class="stat-box">
            <div class="label">剩余雷数</div>
            <div class="value danger" id="minesLeft">10</div>
        </div>
        <div class="stat-box">
            <div class="label">用时</div>
            <div class="value safe" id="timer">0</div>
        </div>
    </div>
    <div class="controls">
        <div class="difficulty-btns">
            <button class="diff-btn active" onclick="setDifficulty('easy')">简单</button>
            <button class="diff-btn" onclick="setDifficulty('medium')">中等</button>
            <button class="diff-btn" onclick="setDifficulty('hard')">困难</button>
        </div>
        <button class="back-btn" onclick="location.href='index.html'">← 返回主页</button>
        <button onclick="initGame()">重新开始</button>
    </div>
    <div class="game-wrapper">
        <div class="game-board" id="board"></div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>💥 游戏结束</h2>
        <p>你踩到了雷!</p>
        <button onclick="initGame()">再试一次</button>
    </div>

    <div class="win hidden" id="winScreen">
        <h2>🎉 恭喜通关!</h2>
        <p>用时: <span id="winTime">0</span> 秒</p>
        <button onclick="initGame()">再玩一次</button>
    </div>

    <script>
        const difficulties = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 12, cols: 12, mines: 20 },
            hard: { rows: 16, cols: 16, mines: 40 }
        };
        
        let config, board, revealed, flagged, gameOver, won;
        let minesLeft, timerInterval, seconds, firstClick, currentLevel = 'easy';

        function setDifficulty(level) {
            currentLevel = level;
            document.querySelectorAll('.diff-btn').forEach((btn, i) => {
                btn.classList.toggle('active', ['easy', 'medium', 'hard'][i] === level);
            });
            initGame();
        }

        function initGame() {
            config = difficulties[currentLevel];
            board = [];
            revealed = [];
            flagged = [];
            gameOver = false;
            won = false;
            firstClick = true;
            minesLeft = config.mines;
            seconds = 0;
            
            clearInterval(timerInterval);
            
            for (let i = 0; i < config.rows; i++) {
                board[i] = [];
                revealed[i] = [];
                flagged[i] = [];
                for (let j = 0; j < config.cols; j++) {
                    board[i][j] = 0;
                    revealed[i][j] = false;
                    flagged[i][j] = false;
                }
            }
            
            document.getElementById('minesLeft').textContent = minesLeft;
            document.getElementById('timer').textContent = '0';
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('winScreen').classList.add('hidden');
            
            render();
        }

        function placeMines(safeRow, safeCol) {
            let minesPlaced = 0;
            while (minesPlaced < config.mines) {
                const r = Math.floor(Math.random() * config.rows);
                const c = Math.floor(Math.random() * config.cols);
                if (board[r][c] === -1) continue;
                if (Math.abs(r - safeRow) <= 1 && Math.abs(c - safeCol) <= 1) continue;
                board[r][c] = -1;
                minesPlaced++;
            }
            
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    if (board[i][j] !== -1) {
                        board[i][j] = countMines(i, j);
                    }
                }
            }
        }

        function countMines(row, col) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    const r = row + i, c = col + j;
                    if (r >= 0 && r < config.rows && c >= 0 && c < config.cols && board[r][c] === -1) {
                        count++;
                    }
                }
            }
            return count;
        }

        function render() {
            const boardEl = document.getElementById('board');
            const wrapper = document.querySelector('.game-wrapper');
            
            // 计算可用宽度
            const padding = 20; // 左右padding
            const boardPadding = 20; // 棋盘内边距
            const gap = 4; // 格子间距（边框）
            const availableWidth = Math.min(window.innerWidth - padding, wrapper.offsetWidth - padding) - boardPadding;
            
            // 根据列数和可用宽度计算格子大小，确保是正方形
            const gapSize = 4; // 格子间距
            const cellSize = Math.floor((availableWidth - (config.cols - 1) * gapSize) / config.cols);
            
            boardEl.style.gridTemplateColumns = `repeat(${config.cols}, ${cellSize}px)`;
            boardEl.style.gridTemplateRows = `repeat(${config.rows}, ${cellSize}px)`;
            boardEl.innerHTML = '';
            
            // 根据格子大小调整字体
            const fontSize = Math.max(cellSize * 0.4, 10);
            
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    const cell = document.createElement('button');
                    cell.className = 'cell';
                    cell.style.fontSize = fontSize + 'px';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if (revealed[i][j]) {
                        cell.classList.add('revealed');
                        if (board[i][j] === -1) {
                            cell.classList.add('mine');
                            cell.textContent = '💣';
                        } else if (board[i][j] > 0) {
                            cell.textContent = board[i][j];
                            cell.dataset.num = board[i][j];
                        }
                    } else if (flagged[i][j]) {
                        cell.classList.add('flag');
                        cell.textContent = '🚩';
                    }
                    
                    cell.onclick = () => leftClick(i, j);
                    cell.oncontextmenu = (e) => rightClick(e, i, j);
                    boardEl.appendChild(cell);
                }
            }
        }

        function leftClick(row, col) {
            if (gameOver || won || flagged[row][col]) return;
            
            if (firstClick) {
                firstClick = false;
                placeMines(row, col);
                timerInterval = setInterval(() => {
                    seconds++;
                    document.getElementById('timer').textContent = seconds;
                }, 1000);
            }
            
            reveal(row, col);
            checkWin();
        }

        function rightClick(e, row, col) {
            e.preventDefault();
            if (gameOver || won || revealed[row][col]) return;
            
            flagged[row][col] = !flagged[row][col];
            minesLeft += flagged[row][col] ? -1 : 1;
            document.getElementById('minesLeft').textContent = minesLeft;
            render();
        }

        function reveal(row, col) {
            if (row < 0 || row >= config.rows || col < 0 || col >= config.cols) return;
            if (revealed[row][col] || flagged[row][col]) return;
            
            revealed[row][col] = true;
            
            if (board[row][col] === -1) {
                gameOver = true;
                clearInterval(timerInterval);
                revealAllMines();
                render();
                setTimeout(() => {
                    document.getElementById('gameOver').classList.remove('hidden');
                }, 300);
                return;
            }
            
            if (board[row][col] === 0) {
                for (let i = -1; i <= 1; i++) {
                    for (let j = -1; j <= 1; j++) {
                        reveal(row + i, col + j);
                    }
                }
            }
            
            render();
        }

        function revealAllMines() {
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    if (board[i][j] === -1) {
                        revealed[i][j] = true;
                    }
                }
            }
        }

        function checkWin() {
            let unrevealedSafe = 0;
            for (let i = 0; i < config.rows; i++) {
                for (let j = 0; j < config.cols; j++) {
                    if (!revealed[i][j] && board[i][j] !== -1) {
                        unrevealedSafe++;
                    }
                }
            }
            
            if (unrevealedSafe === 0) {
                won = true;
                clearInterval(timerInterval);
                document.getElementById('winTime').textContent = seconds;
                document.getElementById('winScreen').classList.remove('hidden');
            }
        }

        initGame();
    </script>
</body>
</html>
