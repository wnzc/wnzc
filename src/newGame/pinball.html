<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹球 - 游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: #fff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .header {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .label { font-size: 0.75rem; opacity: 0.8; }
        .stat-box .value { font-size: 1.3rem; font-weight: bold; color: #4ECDC4; }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); }
        .back-btn { background: rgba(255, 255, 255, 0.15); }
        .game-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        #gameCanvas {
            background: #0a0a1a;
            border-radius: 10px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            max-width: 100%;
        }
        .instructions {
            margin-top: 10px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .game-over, .win {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .game-over h2 { color: #FF6B6B; font-size: 2rem; }
        .win h2 { color: #4ECDC4; font-size: 2rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h1>弹球</h1>
    <div class="header">
        <div class="stat-box">
            <div class="label">得分</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="label">生命</div>
            <div class="value" id="lives">3</div>
        </div>
    </div>
    <div class="controls">
        <button class="back-btn" onclick="location.href='index.html'">← 返回主页</button>
        <button onclick="initGame()">重新开始</button>
    </div>
    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    <p class="instructions">鼠标或触摸控制球拍，防止球掉落！</p>

    <div class="game-over hidden" id="gameOver">
        <h2>💀 游戏结束</h2>
        <p style="margin: 15px 0;">得分: <span id="finalScore">0</span></p>
        <button onclick="initGame()">再来一局</button>
    </div>

    <div class="win hidden" id="winScreen">
        <h2>🎉 恭喜通关!</h2>
        <p style="margin: 15px 0;">得分: <span id="winScore">0</span></p>
        <button onclick="initGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let paddle, ball, bricks;
        let score, lives;
        let gameLoop, gameRunning;
        let canvasWidth, canvasHeight;
        
        function resizeCanvas() {
            canvasWidth = Math.min(window.innerWidth - 30, 500);
            canvasHeight = Math.min(window.innerHeight - 200, 500);
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        
        function initGame() {
            resizeCanvas();
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('winScreen').classList.add('hidden');
            
            score = 0;
            lives = 3;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            
            paddle = {
                x: canvasWidth / 2 - 50,
                y: canvasHeight - 30,
                width: 100,
                height: 15
            };
            
            resetBall();
            createBricks();
            
            gameRunning = true;
            clearInterval(gameLoop);
            gameLoop = setInterval(update, 16);
        }
        
        function resetBall() {
            ball = {
                x: canvasWidth / 2,
                y: canvasHeight - 50,
                radius: 10,
                dx: 4 * (Math.random() > 0.5 ? 1 : -1),
                dy: -4,
                speed: 4
            };
        }
        
        function createBricks() {
            bricks = [];
            const rows = 5;
            const cols = 7;
            const brickWidth = (canvasWidth - 40) / cols - 5;
            const brickHeight = 25;
            
            const colors = ['#FF6B6B', '#FF8E53', '#FFD93D', '#4ECDC4', '#9B59B6'];
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    bricks.push({
                        x: 20 + c * (brickWidth + 5),
                        y: 40 + r * (brickHeight + 5),
                        width: brickWidth,
                        height: brickHeight,
                        color: colors[r],
                        alive: true
                    });
                }
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            // 移动球
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // 墙壁碰撞
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvasWidth) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }
            
            // 掉落
            if (ball.y + ball.radius > canvasHeight) {
                lives--;
                document.getElementById('lives').textContent = lives;
                if (lives <= 0) {
                    gameOver();
                    return;
                }
                resetBall();
            }
            
            // 球拍碰撞
            if (ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                ball.dy = -ball.speed;
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = (hitPos - 0.5) * 8;
            }
            
            // 砖块碰撞
            bricks.forEach(brick => {
                if (!brick.alive) return;
                if (ball.x + ball.radius > brick.x &&
                    ball.x - ball.radius < brick.x + brick.width &&
                    ball.y + ball.radius > brick.y &&
                    ball.y - ball.radius < brick.y + brick.height) {
                    brick.alive = false;
                    ball.dy = -ball.dy;
                    score += 10;
                    document.getElementById('score').textContent = score;
                    ball.speed += 0.2;
                }
            });
            
            // 绘制砖块
            bricks.forEach(brick => {
                if (!brick.alive) return;
                ctx.fillStyle = brick.color;
                ctx.beginPath();
                ctx.roundRect(brick.x, brick.y, brick.width, brick.height, 5);
                ctx.fill();
            });
            
            // 绘制球拍
            ctx.fillStyle = '#4ECDC4';
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fill();
            
            // 绘制球
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // 胜利检测
            if (bricks.every(b => !b.alive)) {
                gameWin();
            }
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }
        
        function gameWin() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('winScore').textContent = score;
            document.getElementById('winScreen').classList.remove('hidden');
        }
        
        // 鼠标/触摸控制
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = Math.max(0, Math.min(e.clientX - rect.left - paddle.width / 2, canvasWidth - paddle.width));
        });
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            paddle.x = Math.max(0, Math.min(e.touches[0].clientX - rect.left - paddle.width / 2, canvasWidth - paddle.width));
        });
        
        window.addEventListener('resize', () => {
            if (gameRunning) {
                resizeCanvas();
                paddle.y = canvasHeight - 30;
            }
        });
        
        initGame();
    </script>
</body>
</html>
