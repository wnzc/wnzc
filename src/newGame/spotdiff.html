<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>找不同 - 游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #fff;
            overflow: hidden;
        }
        h1 { font-size: 1.3rem; margin-bottom: 5px; }
        .header {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .stat-box {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box .label { font-size: 0.55rem; opacity: 0.9; }
        .stat-box .value { font-size: 1rem; font-weight: bold; }
        .controls {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        button {
            padding: 5px 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
        .back-btn { background: rgba(255,255,255,0.2); }
        .game-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            padding: 5px;
            background: #fff;
            border-radius: 8px;
        }
        .cell {
            aspect-ratio: 1;
            background: #ddd;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell:active { transform: scale(0.9); }
        .cell.found {
            background: #4ECDC4 !important;
            animation: pulse 0.3s;
        }
        .cell.wrong {
            background: #FF6B6B !important;
        }
        @keyframes pulse {
            50% { transform: scale(1.2); }
        }
        .hint {
            margin-top: 8px;
            font-size: 0.7rem;
            opacity: 0.8;
        }
        .win-message {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .win-message h2 { font-size: 1.8rem; margin-bottom: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h1>🔍 找不同</h1>
    <div class="header">
        <div class="stat-box">
            <div class="label">找到</div>
            <div class="value" id="found">0/5</div>
        </div>
        <div class="stat-box">
            <div class="label">用时</div>
            <div class="value" id="time">0s</div>
        </div>
    </div>
    <div class="controls">
        <button class="back-btn" onclick="location.href='index.html'">← 返回</button>
        <button onclick="initGame()">换一组</button>
    </div>
    <div class="game-area">
        <div class="grid" id="grid1"></div>
        <div class="grid" id="grid2"></div>
    </div>
    <p class="hint">点击找出两图不同之处</p>
    <div class="win-message hidden" id="winMsg">
        <h2>🎉 全部找到！</h2>
        <p style="margin-bottom:15px">用时: <span id="finalTime">0</span>秒</p>
        <button onclick="initGame()">再来一局</button>
    </div>

    <script>
        const GRID_SIZE = 5;
        const DIFF_COUNT = 5;
        const EMOJIS = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍑', '🍒', '🥝', '🍌', '🥭', '🌸', '🌺', '🌻', '🌷', '🌹', '🪻', '🌼', '🌈', '⭐', '🌙', '☀️', '🔥', '💧', '🌊', '🍀', '🌿', '🌴', '🎋', '🎍', '🪨', '⛰️', '🏔️', '🗻', '🌋', '🏝️', '🦋', '🐝', '🐞', '🦁', '🐯', '🦊', '🐻', '🐼', '🐨', '🐰', '🦄', '🐸', '🐵', '🐮', '🐷', '🐔', '🐧', '🐦', '🦆', '🦅', '🦉', '🦇', '🐺', '🐗', '🐴', '🦄', '🐲', '🦎', '🐍', '🐢', '🦎', '🦖', '🦕', '🐙', '🦑', '🦐', '🦞', '🦀', '🐡', '🐠', '🐟', '🐬', '🐳', '🦈', '🐋', '🐊'];
        
        let diffPositions = [];
        let foundCount = 0;
        let startTime;
        let timerInterval;
        
        function initGame() {
            document.getElementById('winMsg').classList.add('hidden');
            foundCount = 0;
            document.getElementById('found').textContent = `0/${DIFF_COUNT}`;
            
            // 生成相同的基础图案
            const grid1 = document.getElementById('grid1');
            const grid2 = document.getElementById('grid2');
            
            const baseEmojis = [];
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                baseEmojis.push(EMOJIS[Math.floor(Math.random() * EMOJIS.length)]);
            }
            
            // 生成不同的位置
            diffPositions = [];
            const allPositions = Array.from({length: GRID_SIZE * GRID_SIZE}, (_, i) => i);
            shuffle(allPositions);
            for (let i = 0; i < DIFF_COUNT; i++) {
                diffPositions.push(allPositions[i]);
            }
            
            // 渲染两个网格
            grid1.innerHTML = '';
            grid2.innerHTML = '';
            
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell1 = document.createElement('div');
                cell1.className = 'cell';
                cell1.dataset.index = i;
                cell1.textContent = baseEmojis[i];
                cell1.onclick = () => clickCell(i, 1);
                grid1.appendChild(cell1);
                
                const cell2 = document.createElement('div');
                cell2.className = 'cell';
                cell2.dataset.index = i;
                cell2.textContent = diffPositions.includes(i) 
                    ? EMOJIS[(EMOJIS.indexOf(baseEmojis[i]) + 1) % EMOJIS.length]
                    : baseEmojis[i];
                cell2.onclick = () => clickCell(i, 2);
                grid2.appendChild(cell2);
            }
            
            // 开始计时
            startTime = Date.now();
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTime, 100);
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }
        
        function updateTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = elapsed + 's';
        }
        
        function clickCell(index, grid) {
            if (diffPositions.includes(index)) {
                const cells1 = document.querySelectorAll('#grid1 .cell');
                const cells2 = document.querySelectorAll('#grid2 .cell');
                
                if (grid === 1) {
                    cells1[index].classList.add('found');
                    cells2[index].classList.add('found');
                } else {
                    cells2[index].classList.add('found');
                    cells1[index].classList.add('found');
                }
                
                foundCount++;
                document.getElementById('found').textContent = `${foundCount}/${DIFF_COUNT}`;
                
                if (foundCount === DIFF_COUNT) {
                    clearInterval(timerInterval);
                    document.getElementById('finalTime').textContent = 
                        Math.floor((Date.now() - startTime) / 1000);
                    document.getElementById('winMsg').classList.remove('hidden');
                }
            } else {
                const cells = grid === 1 
                    ? document.querySelectorAll('#grid1 .cell')
                    : document.querySelectorAll('#grid2 .cell');
                cells[index].classList.add('wrong');
                setTimeout(() => cells[index].classList.remove('wrong'), 300);
            }
        }
        
        initGame();
    </script>
</body>
</html>
