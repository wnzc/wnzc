<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>打地鼠 - 游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a472a, #2d5a3f);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #fff;
            overflow: hidden;
        }
        h1 { font-size: 1.4rem; margin-bottom: 6px; }
        .header {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }
        .stat-box {
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box .label { font-size: 0.6rem; opacity: 0.9; }
        .stat-box .value { font-size: 1.2rem; font-weight: bold; }
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        button {
            padding: 6px 14px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
        .back-btn { background: rgba(255,255,255,0.2); }
        .game-area {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 15px;
            background: #3d2817;
            border-radius: 15px;
            border: 4px solid #5a3d2b;
        }
        .hole {
            width: 80px;
            height: 80px;
            background: radial-gradient(ellipse at center, #1a0f08 60%, #3d2817 100%);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }
        .mole {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #d4a574, #8b6914);
            border-radius: 50%;
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.15s ease-out;
            cursor: pointer;
        }
        .mole::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #1a0f08;
            border-radius: 50%;
            top: 15px;
            left: 12px;
        }
        .mole::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #1a0f08;
            border-radius: 50%;
            top: 15px;
            right: 12px;
        }
        .mole.up { bottom: 15px; }
        .mole.hit {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #cc4444) !important;
            transform: translateX(-50%) scale(0.9);
        }
        .timer-bar {
            width: 100%;
            max-width: 280px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ECDC4, #44bd8c);
            transition: width 0.1s linear;
        }
        .instructions {
            margin-top: 8px;
            font-size: 0.7rem;
            opacity: 0.8;
        }
        @media (max-width: 320px) {
            .hole { width: 65px; height: 65px; }
            .mole { width: 40px; height: 40px; }
            .game-area { gap: 6px; padding: 10px; }
        }
    </style>
</head>
<body>
    <h1>🕹️ 打地鼠</h1>
    <div class="header">
        <div class="stat-box">
            <div class="label">得分</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="label">最高</div>
            <div class="value" id="high">0</div>
        </div>
    </div>
    <div class="controls">
        <button class="back-btn" onclick="location.href='index.html'">← 返回</button>
        <button onclick="startGame()">开始游戏</button>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
    <div class="game-area" id="gameArea"></div>
    <p class="instructions">30秒内尽可能多地击中地鼠！</p>

    <script>
        const HOLES = 9;
        const GAME_TIME = 30;
        let score, high = parseInt(localStorage.getItem('whackHigh') || '0');
        let timeLeft, gameRunning;
        let moleTimer, gameTimer;
        
        document.getElementById('high').textContent = high;
        
        function init() {
            const area = document.getElementById('gameArea');
            area.innerHTML = '';
            for (let i = 0; i < HOLES; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                const mole = document.createElement('div');
                mole.className = 'mole';
                mole.onclick = () => whack(mole);
                hole.appendChild(mole);
                area.appendChild(hole);
            }
        }
        
        function startGame() {
            score = 0;
            timeLeft = GAME_TIME;
            gameRunning = true;
            document.getElementById('score').textContent = score;
            document.getElementById('timer').style.width = '100%';
            
            clearInterval(gameTimer);
            clearTimeout(moleTimer);
            
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').style.width = (timeLeft / GAME_TIME * 100) + '%';
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
            
            showMole();
        }
        
        function showMole() {
            if (!gameRunning) return;
            
            const moles = document.querySelectorAll('.mole');
            moles.forEach(m => m.classList.remove('up', 'hit'));
            
            const randomMole = moles[Math.floor(Math.random() * moles.length)];
            randomMole.classList.add('up');
            
            const showTime = Math.max(600, 1200 - (GAME_TIME - timeLeft) * 20);
            moleTimer = setTimeout(() => {
                randomMole.classList.remove('up');
                if (gameRunning) showMole();
            }, showTime);
        }
        
        function whack(mole) {
            if (!gameRunning || !mole.classList.contains('up')) return;
            
            mole.classList.add('hit');
            score += 10;
            document.getElementById('score').textContent = score;
            
            if (score > high) {
                high = score;
                localStorage.setItem('whackHigh', high);
                document.getElementById('high').textContent = high;
            }
            
            setTimeout(() => mole.classList.remove('up', 'hit'), 200);
            clearTimeout(moleTimer);
            showMole();
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);
            document.querySelectorAll('.mole').forEach(m => m.classList.remove('up'));
        }
        
        init();
    </script>
</body>
</html>
