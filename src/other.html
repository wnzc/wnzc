<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蜗牛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
            --accent-color: #ff9800;
            --list-item-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* 时钟日期显示区域 */
        .datetime-display {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px 5px;
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.15) 0%, rgba(255, 87, 34, 0.1) 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 152, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .datetime-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 152, 0, 0.1) 0%, transparent 60%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .time-display {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #5f27cd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.4));
            position: relative;
            z-index: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-period {
            font-size: 20px;
            font-weight: 500;
            color: #ff9800;
            margin-left: 8px;
            vertical-align: super;
        }

        .date-display {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .weekday {
            color: #ff9800;
            font-weight: 600;
        }

        /* 列表容器 */
        .tools-list {
            width: 100%;
        }

        /* 列表项 */
        .tool-item {
            background: var(--list-item-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            padding: 16px;
        }

        .tool-item:last-child {
            margin-bottom: 0;
        }

        .tool-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        /* 左侧图标区域 */
        .item-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-right: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        /* 中间内容区域 */
        .item-content {
            flex-grow: 1;
        }

        .item-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* 右侧箭头区域 */
        .item-arrow {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            flex-shrink: 0;
            margin-left: 8px;
        }

        .item-arrow i {
            font-size: 14px;
        }

        /* 嵌入网页容器 */
        .embed-section {
            margin-bottom: 30px;
            width: 100%;
        }

        .embed-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            height: 250px;
            /* 添加发光效果 */
            box-shadow: 
                0 0 20px rgba(255, 152, 0, 0.1),
                inset 0 0 30px rgba(255, 152, 0, 0.05);
            position: relative;
        }

        .embed-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000000;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- 头部：Logo + 标题 -->
        <div class="header">
            <div class="logo-img" style="display:flex;align-items:center;justify-content:center;">
                <i class="fa-solid fa-toolbox" style="font-size:50px;color:#fff;"></i>
            </div>
            <h1 class="title">工具箱</h1>
            <p class="subtitle">一触即达</p>
        </div>

        <!-- 时间日期显示 -->
        <div class="datetime-display">
            <div class="time-display">
                <span id="clock-time">00:00:00</span>
            </div>
            <div class="date-display">
                <span id="date-year">2026年</span><span id="date-month">4月</span><span id="date-day">9日</span>
                &nbsp;&nbsp;
                <span class="weekday" id="weekday">星期四</span>
            </div>
        </div>

        <!-- 工具列表 -->
        <div class="tools-list" id="toolsList">
            <!-- 动态内容将通过JavaScript生成 -->
        </div>
    </div>

    <script>
        // 工具数据结构
        const toolsData = [
            { title: "彩票查询", desc: "双色球、大乐透开奖结果", icon: "fa-solid fa-futbol", link: "lottery.html" },
            { title: "精选壁纸", desc: "横屏/竖屏/视频壁纸", icon: "fa-solid fa-images", link: "wallpaper2.html" },
            { title: "电脑壁纸", desc: "分类壁纸浏览", icon: "fa-solid fa-image", link: "wallpaper.html" },
            { title: "美女视频", desc: "视频在线播放", icon: "fa-solid fa-play-circle", link: "video-player.html" },
            { title: "今日油价", desc: "全国实时油价查询", icon: "fa-solid fa-gas-pump", link: "oil-price.html" },
            { title: "五子棋"  , desc: "五子棋游戏", icon: "fa-solid fa-grip-lines", link: "gobang-game.html" },
            { title: "游戏合集", desc: "游戏合集", icon: "fa-solid fa-gamepad", link: "newGame/index.html" },
            { title: "星座运势", desc: "星座运势", icon: "fa-solid fa-star-and-crescent", link: "fortune.html" },
            { title: "答案之书", desc: "答案之书", icon: "fa-solid fa-book", link: "answerbook.html" },
            { title: "数独游戏", desc: "神秘数字谜题", icon: "fa-solid fa-puzzle-piece", link: "sudoku.html" },
            { title: "开关灯"  , desc: "益智游戏-开关灯", icon: "fa-solid fa-lightbulb", link: "switch.html" },
            { title: "扫雷游戏", desc: "娱乐一下吧", icon: "fa-solid fa-bomb", link: "minesweeper.html" }
        ];

        // 渲染工具列表
        function renderToolsList() {
            const toolsContainer = document.getElementById('toolsList');

            toolsData.forEach(tool => {
                const toolElement = document.createElement('a');
                toolElement.href = tool.link;
                toolElement.className = 'tool-item';

                // 使用模板字符串构建HTML
                toolElement.innerHTML = `
                <div class="item-icon">
                    ${tool.icon.startsWith('fa-') 
                        ? `<i class="${tool.icon}" style="font-size:28px;color:#ff9800;"></i>` 
                        : `<img src="${tool.icon}" alt="${tool.title}" onerror="this.onerror=null; this.src='https://via.placeholder.com/50?text=Icon';">`}
                </div>
                <div class="item-content">
                    <div class="item-title">${tool.title}</div>
                    <div class="item-desc">${tool.desc}</div>
                </div>
                <div class="item-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            `;

                toolsContainer.appendChild(toolElement);
            });
        }

        // 页面加载完成后渲染列表
        document.addEventListener('DOMContentLoaded', renderToolsList);

        // 更新时钟和日期
        function updateDateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();

            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];

            // 格式化时间
            const timeStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            const period = hours < 12 ? '上午' : '下午';

            // 更新显示
            document.getElementById('clock-time').textContent = timeStr;
            const timePeriodEl = document.getElementById('time-period');
            if (timePeriodEl) timePeriodEl.textContent = period;
            document.getElementById('date-year').textContent = year + '年';
            document.getElementById('date-month').textContent = month + '月';
            document.getElementById('date-day').textContent = day + '日';
            document.getElementById('weekday').textContent = weekday;
        }

        // 初始化并每秒更新
        updateDateTime();
        setInterval(updateDateTime, 1000);

    </script>
</body>

</html>
