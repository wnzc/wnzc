<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蜗牛工具箱</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
            --accent-color: #ff9800;
            --list-item-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #b0b0b0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* 暖心话显示 */
        .warm-message {
            text-align: center;
            margin-bottom: 15px;
            min-height: 80px;
            padding: 15px 20px;
            position: relative;
        }

        .warm-greeting {
            font-size: 18px;
            font-weight: 600;
            color: #feca57;
            margin-bottom: 6px;
        }

        .warm-tip {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.5;
        }

        /* 时钟日期显示区域 */
        .datetime-display {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px 5px;
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.15) 0%, rgba(255, 87, 34, 0.1) 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 152, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .datetime-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 152, 0, 0.1) 0%, transparent 60%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .time-display {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff, #5f27cd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.4));
            position: relative;
            z-index: 1;
            font-variant-numeric: tabular-nums;
        }

        .time-period {
            font-size: 20px;
            font-weight: 500;
            color: #ff9800;
            margin-left: 8px;
            vertical-align: super;
        }

        .date-display {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .weekday {
            color: #ff9800;
            font-weight: 600;
        }

        /* 列表容器 */
        .tools-list {
            width: 100%;
        }

        /* 列表项 */
        .tool-item {
            background: var(--list-item-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            padding: 16px;
        }

        .tool-item:last-child {
            margin-bottom: 0;
        }

        .tool-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        /* 左侧图标区域 */
        .item-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            margin-right: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        /* 中间内容区域 */
        .item-content {
            flex-grow: 1;
        }

        .item-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* 右侧箭头区域 */
        .item-arrow {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
            flex-shrink: 0;
            margin-left: 8px;
        }

        .item-arrow i {
            font-size: 14px;
        }

        /* 嵌入网页容器 */
        .embed-section {
            margin-bottom: 30px;
            width: 100%;
        }

        .embed-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            height: 250px;
            /* 添加发光效果 */
            box-shadow: 
                0 0 20px rgba(255, 152, 0, 0.1),
                inset 0 0 30px rgba(255, 152, 0, 0.05);
            position: relative;
        }

        .embed-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #000000;
        }
    </style>
</head>

<body>

            { title: "猜电影", desc: "猜电影的游戏", icon: "https://moviegame.top/favicon.ico", link: "https://moviegame.top" },
            { title: "文字游戏", desc: "摸鱼文字游戏", icon: "http://tinywaste.maougame.com/favicon.ico", link: "http://tinywaste.maougame.com" },
            { title: "益智小游戏", desc: "益智小游戏", icon: "https://gridspech.baublejar.com/assets/favicon-C29Vu5tQ.png", link: "https://gridspech.baublejar.com" },
            { title: "涂色小游戏", desc: "涂色小游戏", icon: "https://www.coloringwell.com/logo.svg", link: "https://www.coloringwell.com" },
            { title: "更多", desc: "腾讯帮小忙在线工具箱", icon: "images/icon_bangxiaomang.png", link: "https://tool.browser.qq.com" }
        ];

        // 渲染工具列表
        function renderToolsList() {
            const toolsContainer = document.getElementById('toolsList');

            toolsData.forEach(tool => {
                const toolElement = document.createElement('a');
                toolElement.href = tool.link;
                toolElement.className = 'tool-item';

                // 使用模板字符串构建HTML
                toolElement.innerHTML = `
                <div class="item-icon">
                    ${tool.icon.startsWith('fa-') 
                        ? `<i class="${tool.icon}" style="font-size:28px;color:#ff9800;"></i>` 
                        : `<img src="${tool.icon}" alt="${tool.title}" onerror="this.onerror=null; this.src='https://via.placeholder.com/50?text=Icon';">`}
                </div>
                <div class="item-content">
                    <div class="item-title">${tool.title}</div>
                    <div class="item-desc">${tool.desc}</div>
                </div>
                <div class="item-arrow">
                    <i class="fas fa-chevron-right"></i>
                </div>
            `;

                toolsContainer.appendChild(toolElement);
            });
        }

        // 页面加载完成后渲染列表
        document.addEventListener('DOMContentLoaded', renderToolsList);

        // 更新时钟和日期
        function updateDateTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();

            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];

            // 格式化时间
            const timeStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            const period = hours < 12 ? '上午' : '下午';

            // 更新显示
            document.getElementById('clock-time').textContent = timeStr;
            const timePeriodEl = document.getElementById('time-period');
            if (timePeriodEl) timePeriodEl.textContent = period;
            document.getElementById('date-year').textContent = year + '年';
            document.getElementById('date-month').textContent = month + '月';
            document.getElementById('date-day').textContent = day + '日';
            document.getElementById('weekday').textContent = weekday;
        }

        // 初始化并每秒更新
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 暖心话本地存储键
        const WARM_MSG_KEY = 'warm_message_cache';

        // 显示暖心话
        function showWarmMessage(data) {
            document.getElementById('warmGreeting').textContent = data.msg;
            document.getElementById('warmTip').textContent = data.nxyj;
        }

        // 获取缓存的暖心话
        function getCachedWarmMessage() {
            try {
                const cached = localStorage.getItem(WARM_MSG_KEY);
                if (cached) {
                    return JSON.parse(cached);
                }
            } catch (e) {}
            return null;
        }

        // 保存暖心话到缓存
        function saveWarmMessage(data) {
            localStorage.setItem(WARM_MSG_KEY, JSON.stringify({
                msg: data.msg,
                nxyj: data.nxyj,
                savedAt: Date.now()
            }));
        }

        // 获取暖心话
        async function fetchWarmMessage() {
            // 先显示缓存
            const cached = getCachedWarmMessage();
            if (cached) {
                showWarmMessage(cached);
            }

            // 请求新数据
            try {
                const response = await fetch('http://apis.uctb.cn/api/time?type=2');
                const result = await response.json();
                if (result.code === 1) {
                    showWarmMessage(result);
                    saveWarmMessage(result);
                }
            } catch (error) {
                console.error('获取暖心话失败:', error);
            }
        }
        fetchWarmMessage();

    </script>
</body>

</html>
